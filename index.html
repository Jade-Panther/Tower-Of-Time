                y: -108,
                yv: 0,
                rot: 0,
            },
            pelvis: {
                y: 40,
                yv: 0,
                rot: 0,
            }
            
        };
        
        this.game = game;
        this.frame = 0;
        this.action = 'idle';
        this.player = this.game.player;
        this.shockwaves = [];
        this.spawners = [];
        this.staffGlow = 0;
        this.phase = 1;
        this.teleportTimer = 0;
        this.opacity = 255;
        this.maxWalkDist = 91;
        this.invulnerable = false;
        this.dead = false;
        this.walking = false;
        this.walkTimer = 0;
        this.walkDir = 1;
        this.waitTime = 0;
    }
    fall(bodyPart) {
        // Animate a specific body part
        this.anim[bodyPart].y += this.anim[bodyPart].yv;
        this.anim[bodyPart].yv += 0.2;
    }
    shoot() {
        var targetAngle = atan2(this.player.y-this.y+120, this.player.x-this.x-130)
        
        if(this.action === 'shootFire' && frameCount % 60 === 0) {
            playSound('spell')
            this.game.bullets.push(new Projectile({
                x: this.x+130,
                y: this.y-120,
                wid: 40,
                hei: 30,
                angle: targetAngle+random(-10, 10),
                from: 'enemy',
                img: 'boss_bullet',
                past: false,
                timeSinceStart: this.game.timeSinceStart,
            }))
        }
        else if(this.action === 'shootArrow' && frameCount % 100 === 0) {
            for(let i = 0; i<360; i+=360/9) {
                    this.game.bullets.push(new Projectile({
                        x: this.x+110,
                        y: this.y-120,
                        wid: 40,
                        hei: 30,
                        angle: frameCount+i,
                        from: 'enemy',
                        img: 'arrow',
                        past: false,
                        timeSinceStart: this.game.timeSinceStart,
                    }))
                }
        }
        
        if(this.phase === 1 && random(0, 1) < 0.006) {
            this.game.bullets.push(new Time_Bomb({
                x: this.x, y: this.y+this.wid/2,
                wid: 10, hei: 10,
                angle: 45,
                range: this.player.x-this.x,
                height: this.player.y-this.y,
                
            }))
        }
        
    }
    animate() {
        // All the animations
        if(this.action === 'slamStaff') {
            if(this.frame < 30) {
                this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, -30, 0.1);   
                this.anim.rightArm.y = lerp(this.anim.rightArm.y, -100, 0.1);
                this.anim.leftArm.rot = lerp(this.anim.leftArm.rot, -130, 0.15);
                this.staffGlow = lerp(this.staffGlow, 250, 0.03);
            }
            else if(this.frame > 80 && this.frame < 130) {
                this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, 0, 0.2);   
                this.anim.rightArm.y = lerp(this.anim.rightArm.y, -84, 0.2);
                this.anim.leftArm.rot = lerp(this.anim.leftArm.rot, 10, 0.05);
                if(this.frame > 120) {
                    this.game.camera.shake(1, 1)
                    for(let i = 0; i<5; i++) {
                    Particles.create({
                        x: this.x+70, y: this.y+200,
                        s: random(2, 5),
                        fs: 1,
                        xv: random(-2, 2),
                        yv: random(-1, -5)
                        
                    })
                    }
                    if(this.frame % 8 == 0) {
                        this.shockwaves.push({x: this.x+100, y: this.y+170, wid: 10, delay: map(this.frame, 120, 150, 10, 300), opac: 150})
                    }
                    
                }
                this.staffGlow = lerp(this.staffGlow, 0, 0.15);
            }
            else if (this.frame > 130) {
                this.changeAction('idle') 
                
                if(dist(this.x+70, this.y+200, this.game.player.x, this.game.player.y) < 250) {
                    Body.applyForce(this.game.player.body, this.game.player.body.position,
                        {
                            x: 0.09, 
                            y: -0.02
                        }
                    )
                    this.game.player.takeDamage(1)
                }
            }
        }
        else if(this.action.includes('shoot')) {
            if(this.frame < 30) {
                this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, -30, 0.1);   
                this.anim.rightArm.y = lerp(this.anim.rightArm.y, -100, 0.1);
            }
            else if(this.frame < 200) {
                if(this.frame % 30 < 15) {
                    this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, 0, 0.1);   
                    this.anim.rightArm.y = lerp(this.anim.rightArm.y, -84, 0.1);
                }
                else {
                    this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, -20, 0.1);   
                    this.anim.rightArm.y = lerp(this.anim.rightArm.y, -90, 0.1);
                }
            }
            else if(this.frame < 230) {
                this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, 0, 0.15);   
                this.anim.rightArm.y = lerp(this.anim.rightArm.y, -84, 0.15);
            }
            else {
                this.changeAction('idle')
            }
            
        }
        else if(this.action === 'summon') {
            if(this.frame < 40) {
                this.anim.rightArm.rot = lerp(this.anim.rightArm.rot, -30, 0.1);
            }
            else {
                this.anim.rightArm.x = 60+sin(this.frame*2)*7;  
                this.anim.rightArm.rot = -30+sin(this.frame*2)*7;
            }
        }
        else if(this.action === 'die') {
            this.fall('head');
            this.anim.head.rot += 0.6;
            
            if(this.frame > 50) {
                this.fall('leftArm');
                this.anim.leftArm.x += -1;
                
                this.fall('rightArm');
                this.anim.rightArm.rot += -0.5;
                this.anim.rightArm.x += 0.6;
            }
            if(this.frame > 80) {
            
                this.fall('ribs');
                this.anim.ribs.rot -= 1;
            }
            if(this.frame > 96) {
                this.fall('rightLeg');
                
                this.fall('pelvis');
            }
            if(this.frame > 120) {
                this.fall('thigh');
                this.anim.thigh.rot += 1;
                this.anim.calf.rot += 2;
            }
            if(this.frame > 150 && !trans.running) {
                trans.start(() => {
                    scene = 'win'
                })
            }
            
        }
    
        // The walk animation
        if(this.walking) {
            if(this.walkTimer < 50) {
                this.anim.thigh.rot = lerp(this.anim.thigh.rot, -10, 0.07);
                this.anim.rightLeg.rot = lerp(this.anim.rightLeg.rot, 10, 0.07);
                this.anim.calf.rot = lerp(this.anim.calf.rot, -10, 0.1);
                if(this.action !== 'slamStaff') {
                    this.anim.leftArm.rot = lerp(this.anim.leftArm.rot, 5, 0.1);
                }
            }
            else if(this.walkTimer < 100) {
                this.anim.thigh.rot = lerp(this.anim.thigh.rot, 10, 0.07);
                this.anim.rightLeg.rot = lerp(this.anim.rightLeg.rot, -10, 0.07);
                if(this.action !== 'slamStaff') {
                    this.anim.leftArm.rot = lerp(this.anim.leftArm.rot, -5, 0.1);
                }
                this.anim.calf.rot = lerp(this.anim.calf.rot, 0, 0.1);
            }
            else if(this.walkTimer >= 100)  {
                this.walkTimer = 0;   
            }
        }
        else if(this.action !== 'die') {
            this.anim.leftArm.rot = sin(this.frame)*5
        }
    };
    changeAction(newAction) {
        this.action = newAction;
        this.frame = 0;
    };
    drawGear(size, opac, rot) {
        noFill();
        strokeWeight(map(size, 100, 350, 15, 24));
        stroke(colors.LIGHT, opac+sin(frameCount*2)*10)
        
        
        pushMatrix();
            translate(20, 0)
            scale(1+sin(frameCount*2)*0.05)
            ellipse(0, 0, size, size)
            for(let i = 0; i<360; i+=360/15) {
                pushMatrix();
                rotate(rot/2+frameCount*rot+i);
                    rect(33+size/2, 0, 20, 10)
                popMatrix();
            }
        popMatrix();
    }
    display() {
        // Animate using sin
        let ease = this.action === 'idle' ? sin(this.frame) : sin(this.frame)*0.2;
        
        pushMatrix();
        translate(this.x-30, this.y-ease*5);
            // Handle the opacity change
            ctx.globalAlpha = this.opacity/255;
            
            if(this.invulnerable) {
                this.drawGear(330, 100, 0.3)
                this.drawGear(220, 120, 0.5)
                this.drawGear(100, 80, 0.6)
            }
        
            // Right arm (holding staff)
            pushMatrix();
            translate(this.anim.rightArm.x, this.anim.rightArm.y);
            rotate(this.anim.rightArm.rot+ease*2);
                drawStaticArt(28, 84, 100, 'boss_right_arm');
            popMatrix();
            
            // Ribs
            pushMatrix();
            translate(25, this.anim.ribs.y + ease * 2);
            scale(1+ease/17, 1);
            rotate(this.anim.ribs.rot);
                drawStaticArt(0, 0, 70, 'boss_ribs');
            popMatrix();
            
            // Right leg
            pushMatrix();
            translate(43+ease*0, this.anim.rightLeg.y+ease*4);
            scale(1, 1+ease/20);
            rotate(this.anim.rightLeg.rot + ease*-3);
                drawStaticArt(29, 59, 50, 'boss_right_leg');
            popMatrix();
            
            // Pelvis
            drawStaticArt(30, this.anim.pelvis.y, 60, 'boss_pelvis');
            
            // Legg
            pushMatrix();
            translate(4, this.anim.thigh.y); 
            rotate(this.anim.thigh.rot + ease * 3);
            
                // Thigh
                drawStaticArt(0, 31, 42, 'boss_left_thigh');
        
                // Calf
                pushMatrix();
                translate(7, 80); 
                rotate(this.anim.calf.rot + ease * 2); 
                    drawStaticArt(-8, 31, 55, 'boss_left_calf');
                popMatrix();
            popMatrix();
        
            // Boss head
            pushMatrix();
            translate(18, this.anim.head.y + ease * 2);
            rotate(this.anim.head.rot);
                drawStaticArt(0, 0, 85, 'boss_head' + (this.action !== 'idle' ? '_angry' : ''));
                
                if(this.frame % 100 < 5) {
                    fill(colors.DARK);
                    ellipse(15, -20, 5, 5);
                    ellipse(31, -19, 4, 6);
                }
            popMatrix();
            
        
            // Left arm 
            pushMatrix();
            translate(this.anim.leftArm.x, this.anim.leftArm.y);
            rotate(this.anim.leftArm.rot+ease*2);
                drawStaticArt(-22, 50, 45, 'boss_left_arm');
            popMatrix();
        
            // Draw the health bar
            rectMode(CORNER)
            fill(colors.LIGHT)
            rect(43-122/2, -172-6, map(this.health, 0, this.maxHealth, 0, 125), 12, 4)
            rectMode(CENTER)
            
            drawStaticArt(36, -172, 150, 'boss_health')
        popMatrix();
        
        ctx.globalAlpha = 1;
        
        // Draw the shockwaves
        noFill();
        this.shockwaves.forEach((wave, i) => {
            if(wave.delay <= 0) {
                strokeWeight(wave.wid)
                stroke(colors.LIGHT, wave.opac + sin(this.frame*2)*5)
                arc(wave.x, wave.y, 70, 70, -90, 90)
                
                wave.wid-=0.1;
                wave.opac-=0.3
                wave.x+=3;
            }
            wave.delay--;
            
            if(wave.opac < 0) {
                this.shockwaves.splice(i, 1)
            }
        })
        noStroke();
        
        // Draw the circles that spawn the enemies (phase 2)
        this.spawners.forEach((spawner, i) => {
            fill(colors.LIGHT)
            ellipse(spawner.x, spawner.y, 10, 10)
            
            spawner.yVel+=0.01
            
            spawner.x+=spawner.xVel;
            spawner.y+=spawner.yVel;
            
            spawner.time++;
            
            if(spawner.time > 100) {
                const enemy = weightedRandom([Ghost, Flying_Clock, Wraith], [0.5, 0.3, 0.2]);
                this.game.enemies.push(new enemy({
                    x: spawner.x, y: spawner.y, 
                    timeSinceStart:this.timeSinceStart, 
                    target:this.game.player,
                }, this.game))
                this.spawners.splice(i, 1)
            }
            
        })
    };
    handleAttack() {
        // Determine what phase it's in
        if(this.health/this.maxHealth <= 0.75 && this.phase == 1) {
            this.phase = 2;
            this.invulnerable = true;
            this.changeAction('idle')
        }
        if(this.health/this.maxHealth <= 0.3 && this.phase == 3) {
            this.phase = 4;
            this.invulnerable = true;
            this.changeAction('idle')
        }
        // Attacks when invulnerable
        if(this.invulnerable) {
            this.walking = false;
            
            // Destroy bullets that hit shield
            this.game.bullets.forEach(bullet => {
               if(!bullet.dead && bullet.from == 'player' && dist(bullet.x, bullet.y, this.x+20, this.y) < 300/2) {
                   bullet.die();
               }
            })
            
            // Handle the invulnerable attacks
            if(this.phase === 2) {
                // Change to summoning enemies
                if(this.action !== 'summon') {
                    this.changeAction('summon')
                }
                
                // Spawn enemies
                if(this.frame > 100 && this.frame % 110 === 0) {
                    this.spawners.push({x: this.x+83, y: this.y-162, xVel: random(1, 3), yVel: random(-1, 1), time: 1})
                }
                
                // Change phase 
                if(this.frame >= 2500) {
                    this.phase = 3;
                    this.invulnerable = false;
                    this.action = 'idle'
                }
            }
            else if(this.phase === 4) {
                if(this.action !== 'summon') {
                    this.changeAction('summon')
                }
                
                if(this.frame % 20 === 0) {
                    this.game.blocks.push(new Gear({
                        x: random(-this.game.manager.levelWid, this.game.manager.levelWid), y: -80,
                        wid: random(70, 130),
                        img: ['gear', 'gear2'][floor(random(0, 2))],
                        rotVel: random(-2, 2),
                        falling: true,
                    }))
                }
                
                // Change phase
                if(this.frame >= 2100) {
                    this.phase = 5;
                    this.invulnerable = false;
                    this.action = 'idle'
                }
            }
        }
        
        // Start attacking
        if(this.action === 'idle' && !this.invulnerable) {
            switch(this.phase) {
                case 1: {
                    var rand = floor(random(0, 2))
                    this.changeAction(['slamStaff', 'shootFire'][rand])
                    break;
                }
                case 3: case 5: {
                   this.changeAction(['shootArrow', 'shootFire'][floor(random(0, 2))])
                }
            }
        }
        
        // Walk randomly
        if((this.phase === 1 || this.phase === 3) && random(0, 1) < 0.001) {
            this.walking = true;
            if(this.x > this.maxWalkDist-30) {
                this.walkDir = -1;
            }
            else {
                this.walkDir = 1;
            }
        }
        
        // Destroy floor blocks
        if(this.phase === 5 && frameCount % 50 === 0 && random(0, 1) < 0.3 && this.game.blocksDestroyed <= 20) {
            this.game.destroyFloor();
        }
        
        // Loop the player
        if(this.phase === 3 && frameCount % 200 === 0 && random(0, 1) < 0.1) { 
            this.game.initLoop();
        }
    }
    update() {
        
        if(this.health <= 0 && !this.dead) {
            this.changeAction('die')
            this.dead = true;
        }
        
        // Handle animations
            this.animate();
        
        if(!this.dead) {
            this.updatePos();
            
            
            
            // Handle the different attacks
            this.handleAttack();
            
            // Set action when walking and randomly stop
            if(this.walking) {
                this.action = 'shootFire';
                this.setVelocity(0.3*this.walkDir)
                
                if(random(0, 1) < 0.005 || this.x > this.maxWalkDist) {
                    this.walking = false;
                }
            }
            
            // Shoot bullets
            this.shoot();
        }
        
        this.frame++;
        this.teleportTimer++;
        this.walkTimer++;
    }
}

class Gear extends PhysicsObject {
    constructor(config) {
        config.hei = config.wid;
        config.body = Bodies.circle(config.x, config.y, config.wid/2)
        super(config)
        
        this.falling = config.falling;
        
        Matter.Body.set(this.body, {
            collisionFilter: {
                category: config.falling ? category.fallingGear : category.obstacle, 
                mask: category.player | category.projectile | category.enemy,  
                group: 0

            frictionAir: 0.03,
        });

        this.rotVel = config.rotVel;
        this.img = config.img;
        this.dangerous = config.dangerous;
    }

        pushMatrix();
        translate(this.x, this.y);

        this.updatePos();
    }
}

class Camera {
    /**
     * Modified from one of Radar's program
     **/
    constructor(focus) {
        this.camX = 0;
        this.camY = 0;
        this.midWid = width/2;
        this.midHei = height/2;
        this.scale = 1;
        this.focus = focus;
        this.shaking = false;
        this.shakeStren = 0;
    }
    fix() {
        this.camX = (this.midWid - this.focus.x) * this.scale;
        this.camY = (this.midHei - this.focus.y) * this.scale;
    }
    shake(duration, strength) {
        this.shaking = duration;
        this.shakeStren = strength;
    }
    handle(mapWid, mapHei) {
        
        const minCamX = -(mapWid * this.scale - width);
        const minCamY = -(mapHei * this.scale - height);
        
        const targetX = (this.midWid - this.focus.x) * this.scale;
        const targetY = (this.midHei - this.focus.y) * this.scale;
        
        // Update the camX
        if (mapWid * this.scale <= width) {
            this.camX = (width/2 - mapWid/2 * this.scale) / 2;} 
        else {
            this.camX = lerp(this.camX, targetX, 0.1);
            this.camX = constrain(this.camX, minCamX, 300);
        }
        
        // Update the camY
        if (mapHei * this.scale <= height) {
            this.camY = (height/2 - mapHei/2 * this.scale) / 2;} 
        else {
            this.camY = lerp(this.camY, targetY, 0.1);
            this.camY = constrain(this.camY, minCamY, 300);
        }
                
        // Update the mouse position based on the camera
        mouse.x = (mouseX - this.camX)/this.scale;
        mouse.y = (mouseY - this.camY)/this.scale;
        
        // Shake
        translate(this.camX, this.camY);
        translate(this.midWid, this.midHei);
        scale(this.scale);
        translate(-this.midWid, -this.midHei);
        if (this.shaking !== false) {
            translate(random(0, 1)*this.shakeStren, random(0, 1)*this.shakeStren);
            this.shaking--;
            if (this.shaking < 0) {
                this.shaking = false;
            }
        }
    }
    startScope() {
        pushMatrix();
    }
    endScope() {
        popMatrix();
    }
}

class Past {
    constructor(config) {
        
        this.type = config.type 
        this.timeline = config.timeline
        
        this.currFrame = 0;
        this.position = {x: this.timeline[0].x, y: this.timeline[0].y}
        this.velocity = {x: 0, y: 0}
        this.startFrame = config.startFrame
       
    
    }
    getAdjacientIndices() {
        for (let i = 0; i < this.timeline.length - 1; i++) {
            const current = this.timeline[i];
            const next = this.timeline[i + 1];
            if (this.currFrame >= current.frame && this.currFrame <= next.frame) {
                return [i, i + 1];
            }
        }
    
        return [this.timeline.length - 2, this.timeline.length - 1];
    }
    display() {
        if(this.currFrame >= this.startFrame) {
            if(this.currFrame-this.startFrame < (this.timeline.length-1)*frameGap) {
                const [prevIndex, nextIndex] = this.getAdjacientIndices();
                
                const f1 = this.timeline[prevIndex];
                const f2 = this.timeline[nextIndex];
                
                const r = (this.currFrame - f1.frame) / (f2.frame - f1.frame);
                
                this.position.x = lerp(f1.x, f2.x, r);
                this.position.y = lerp(f1.y, f2.y, r);
                this.angle = lerp(f1.angle, f2.angle, r);
                this.armAngle = lerp(f1.armAngle, f2.armAngle, r)
                this.frame = f2;
            }
            
          
            pushMatrix();
            translate(this.position.x, this.position.y-6);
                    this.dir = this.armAngle > -90 && this.armAngle < 90 ? 1 : -1;
                    
                    if(this.frame.img !== animateArt.player.climb[0] && this.frame.img !== animateArt.player.climb[1]) {
                        pushMatrix();
                        translate(8*this.dir, -5)
                        scale(1, this.dir);
                        rotate(this.armAngle*this.dir)
                            imageMode(CORNER)
                            drawStaticArt(0, -7, 45, 'arm')
                            imageMode(CENTER)
                        popMatrix();
                    }
                
                    pushMatrix();
                    scale(this.dir, 1)
                        image(this.frame.img, 0, 0, this.frame.imgWid, this.frame.imgWid * this.frame.img.height / this.frame.img.width);
                        //drawStaticArt(0, 0, this.frame.imgWid, this.frame.img, true)
                    popMatrix();
                    
                    
                    
            
            popMatrix();
            
            
        }   
    }
    update() {
        this.currFrame += 1.0;
        this.active = this.currFrame >= this.startFrame && this.currFrame-this.startFrame < (this.timeline.length-1)*frameGap
        
        this.x = this.position.x;
        this.y = this.position.y;
    }
}

        this.levelHei = level.length*blockSize;
        
        // Clear spawn points
        this.enemySpawnPoints = [];
        
        // Add gears under floor for boss level
        if(this.game.floorNum === 5) {
            for(let i = 0; i<this.levelWid; i+= 50) {
                this.game.blocks.push(new Gear({
                    x: i,
                    y: this.levelHei+70,
                    wid: random(50, 70),
                    img: ['gear', 'gear2'][floor(random(0, 2))],
                    rotVel: random(-1, 1),
                    dangerous: true,
                }));
            }
        }
        
        // Init the level
        for(let i = 0; i<level.length; i++) {
            for(let j = 0; j<level[i].length; j++) {
                let x = j*blockSize+width/2-this.levelWid/2+blockSize/2;
                let y = i*blockSize+height/2-this.levelHei/2+blockSize/2;
                let top = i > 0 ? level[i-1][j] : false;
                let bottom = i < level.length-1 ? level[i+1][j] : false;
                let left = j > 0 ? level[i][j-1] : false;
                let right = j < level[i].length-1 ? level[i][j+1] : false;
            
                switch(level[i][j]) {
                    case 'w': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: blockSize,
                            hei: blockSize,
                            type: 'wall',
                            img: (right === 'w' && top === 'w') || (left === 'w' && top === 'w') || (bottom === 'w' && right === 'w') || (left === 'w' && bottom === 'w') || [right, left, top, bottom].includes('r') ? 'wall_empty' : 'floor',
                            rot: left === 'w' || right === 'w' ? bottom ? 180 : 0 : right ? 90 : -90,
                        }));
                       
                        if(!bottom && left && right) {
                            this.game.blocks[this.game.blocks.length-1].body.label = 'distroyBlock'
                        }
                        
                        if(i < level.length-1 && (bottom === 's' || (j > 0 && level[i+1][j-1] == 's') || (j > 1 && level[i+1][j-2] == 's'))) {
                            this.game.blocks[this.game.blocks.length-1].body.label = 'aboveStairsBlock'
                        }
                        break;
                    }
                    case 'b': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y-5,
                            wid: 50,
                            hei: 50,
                            type: 'obstacle',
                            img: 'box'
                        }))
                        break;
                    }
                    case '-': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: blockSize,
                            hei: 20,
                            type: !top ? 'wall' : 'passThrough',
                            jumpDownUp: true,
                            img: 'platform'
                            
                        }));

                        break;
                    }
                    case '=': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: blockSize,
                            hei: 20,
                            type: 'passThrough',
                            jumpDownUp: true,
                            img: 'pipe' + ((right === ' ' || left === ' ') ? '_end' : ''),
                            dir: right === ' ' ? -1 : 1
                            
                        }));
                        break;
                    }
                    case 'l': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: blockSize,
                            hei: 24,
                            type: 'ladder',
                            img: 'ladder' 
                        }));
                        
                        if(top != 'l') {
                            this.game.blocks.push(new Block({
                                x: x,
                                y: y-blockSize,
                                wid: blockSize,
                                hei: 20,
                                type: 'ladder',
                                img: 'ladder' 
                            }));
                            
                        }
                        break;
                    }
                    case 'g': {
                        this.game.blocks.push(new Gear({
                            x: x,
                            y: y,
                            wid: random(50, 120),
                            img: ['gear', 'gear2'][floor(random(0, 2))],
                            rotVel: random(-0.7, 0.7)
                        }));
                        break;
                    }
                    case 't': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: 32,
                            hei: 40,
                            type: 'nothing',
                            img: 'torch',
                            animated: true
                        }));
                        break;
                    }
                    case 'c': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y-9,
                            wid: 9,
                            hei: 40,
                            type: 'nothing',
                            img: 'chain',
                        }));
                        break;
                    }
                    case 's': {
                        this.game.blocks.push(new Stairs({
                            x: x-85,
                            y: y-100,
                            wid: 112,
                            hei: 26,
                        }));
                        break;
                    }
                    case 'f': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: 86,
                            hei: 99,
                            type: 'obstacle',
                            img: 'shelf',
                        }));
                        break;
                    }
                    case 'e': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: 35,
                            hei: 30,
                            dir: right === ' ' ? -1 : 1,
                            type: 'nothing',
                            img: 'spiderweb'
                        }))
                        break;
                    }
                    case 'r': {
                        this.game.blocks.push(new Block({
                            x: x,
                            y: y,
                            wid: blockSize,
                            hei: blockSize,
                            type: 'wall',
                            img: 'roof',
                            rot: left === 'w' ? -90 : 0,
                        }));
                    }
                    case ' ': {
                        this.enemySpawnPoints.push({x: x, y: y})
                    }
                }
            }
        }
        
        // Set player position
        if(this.game.floorNum === 5) {
            this.game.player.setPosition(240, height/2)
        }
        else {
            Body.setPosition(this.game.player.body, {x:width/2, y:height/2})
        }
        
        // Always put gears on top
        this.game.blocks.sort((a, b) => {
            if(a instanceof Gear) {
                return 1;
            }
            else if(b instanceof Gear) {
                return -1;
            }
            return 0;
        })
        
        // Add moving walls
        this.movingWalls = clearArray(this.movingWalls)
        this.movingWalls.push(new Block({
            x: width/2-this.viewWidth/2-500/2,
            y: this.levelHei/2,
            wid: 500,
            hei: this.levelHei+200,
            type: 'wall',
            img: 'moving_wall',
            dir: -1
        }))
        this.movingWalls.push(new Block({
            x: (width/2+this.viewWidth/2)+500/2,
            y: this.levelHei/2,
            wid: 500,
            hei: this.levelHei+200,
            type: 'wall',
            img: 'moving_wall',
            dir: 1
        }))
    }
    expand() {
        // Expand
        if(this.viewWidth < this.initView+this.expandAmt*this.game.loopNum) { 
            this.viewWidth = lerp(this.viewWidth, this.initView+this.expandAmt*this.game.loopNum+1, 0.05);
            
            let right = this.movingWalls[1]
            right.setPosition((width/2+this.viewWidth/2)+500/2)
            
            let left = this.movingWalls[0]
            left.setPosition(width/2-this.viewWidth/2-500/2)
        }
        else {
            this.game.expandingLevel = false;
            this.viewWidth = round(this.viewWidth);
        }
    }
}

class Display {
    constructor(game) {
        this.game = game;
        
    }
    drawStatusBar() {
        noStroke();
        pushMatrix();
        pushStyle();
        //translate(181, 51)
        
        
        // Draw the display
        imageMode(CORNER)
        drawStaticArt(7, 7, 428, 'display')
        //drawStaticArt(436, 7, 155, 'display_upgrades')
        drawStaticArt(432, 7, 115, 'display_death')
        imageMode(CENTER)
        
        
        // Draw the powerups
        var pwups = this.game.player.powerups
        for(var i = 0; i<pwups.length; i++) {
            if(pwups[i] !== false) {
                drawStaticArt(347+i*33, 60, 30, 'powerup_' + pwups[i])
            }
        }
        
        // Draw the hearts
        fill(colors.LIGHT);
        for(var i = 0; i<this.game.player.maxHealth; i++) {
            var x = i*38
            
            if(this.game.player.health+0.5 == (i+1)) {
                drawStaticArt(171+x, 34, 32, 'heart_half')
            }
            else if(this.game.player.health < (i+1)) {
                drawStaticArt(171+x, 34, 32, 'heart_empty')
            }
            else {
                drawStaticArt(171+x, 34, 32, 'heart')
            }
        }
        
        textFont(fonts.normal)
        textAlign(LEFT)
        textSize(26);
        text('Floor: ' + this.game.floorNum + ' / 5', 112, 72);
        
        textSize(20);
        text('Powerups: ', 343, 33)
        
        textSize(20)
        text('Deaths: ', 461, 33)
        
        
        textAlign(CENTER, CENTER)
        textSize(19);
        text(this.game.deaths, 490, 45)
        
        pushStyle();
        popMatrix();
        
        
    }
    drawLevelOverlays() {
        if(this.game.floorNum !== 5) {
            textFont(fonts.bold)
            let extraSize = constrain(map(this.game.timeSinceStart, 0, 10, 20, 0), 0, Infinity)
            
            const time = formatTime(constrain(this.game.manager.levelData.dur * 60 - this.game.timeSinceStart, 0, Infinity))
            
            // Level timer
            textSize(30+(time == 0 ? sin(frameCount*4)*3 : 0))
            fill(colors.LIGHT);
            text(time, width/2, 208)
            
            // Say when the level is completed
            if(this.game.floorDone) {
                textSize(28+(time == 0 ? sin(frameCount*4)*2 : 0))
                text('Floor Complete', width/2, 170)
            }
            
            // Floor number
            fill(colors.LIGHT, map(this.game.timeSinceStart, 0, 200, 900, 0));
            if(this.game.loopNum === 1) {
                textFont(fonts.bold);
                textSize(extraSize+36)
                text('FLOOR ' + this.game.floorNum, width/2, 146);
            }
            
            // Loop num
            textSize(extraSize+29)
            text('LOOP ' + this.game.loopNum, width/2, 177);
            
            if(this.game.ghoulTimer > 0) {
                
                fill(colors.DARK, constrain(map(this.game.ghoulTimer, 0, 60, 0, 100), 0, 100))
                rect(this.game.manager.levelWid/2-width/2, this.game.manager.levelHei/2+50, this.game.manager.levelWid+width/2, this.game.manager.levelHei)
            }
        }
    }
    drawBossLevel() {
        pushMatrix();
        translate(300, 350)
        scale(1.2)
            drawStaticArt(0, 0, 500, 'clock_face')
            
            const now = new Date();
            let hour = now.getHours() % 12;
            let minute = now.getMinutes();
            pushMatrix();
            rotate(map(hour, 0, 12, 0, 360)+map(minute, 0, 59, 0, 30)-95)
                drawStaticArt(92, 0, 230, 'clock_arrow');
            popMatrix();
            
            pushMatrix();
            rotate(map(minute, 0, 59, 0, 360)-95)
                drawStaticArt(82, 0, 200, 'clock_arrow')
            popMatrix();
        popMatrix();
        
        fill(colors.DARK, 30)
        rect(this.game.manager.levelWid/2-width/2, this.game.manager.levelHei/2+50, this.game.manager.levelWid+width/2, this.game.manager.levelHei+200)
    }
    shouldDraw(obj) {
        return !obj.dead && dist(obj.x, obj.y, this.game.player.x, this.game.player.y) < 600;
    }
    drawObjects() {
        // Draw the boss level background
        if(this.game.floorNum === 5) {
            this.drawBossLevel();
        }
        
        // Draw the past layer
        this.game.pastPlayers.forEach(p => {
            p.display();
        })
        this.game.bullets.filter(b => b.past && this.shouldDraw(b)).forEach((bullet, i) => {
            bullet.display();
        })
        this.game.enemies.filter(e => e.past && this.shouldDraw(e)).forEach(enemy => {
            enemy.display();  
        })
        
        // Black filter over past
        fill(colors.DARK, 100)
        rect(this.game.manager.levelWid/2-width/2, this.game.manager.levelHei/2+50, this.game.manager.levelWid+width/2+200, this.game.manager.levelHei+300)
        
        // Draw the particles
        if(settingConfig.particles) {
            Particles.run();
        }
        
        this.game.player.displayPowerupEffects();
        
        // Display player and blocks
        this.game.blocks.filter(b => this.shouldDraw(b)).forEach(block => {
            if((block.body.label !== 'aboveStairsBlock' || !this.game.floorDone)) {
                block.update();
            }
        })
        this.game.player.display();
        
        // Overlays over top and bottom of the scene
        fill(colors.DARK)
        rect(this.game.manager.levelWid/2, height/2-this.game.manager.levelHei/2-80, this.game.manager.levelWid, 170)
        rect(this.game.manager.levelWid/2, height/2+this.game.manager.levelHei/2+80, this.game.manager.levelWid, 170)
        
        // Draw everything else
        this.game.powerups.forEach((powerup, i) => {
            powerup.update();
            
            if(powerup.collected) {
                this.game.powerups.splice(i, 1)
            }
        })
        this.game.bullets.filter(b => !b.past && this.shouldDraw(b)).forEach((bullet, i) => {
            bullet.display();
        })
        this.game.enemies.filter(e => !e.past && this.shouldDraw(e)).forEach(enemy => {
            enemy.display();
        })
        this.game.manager.movingWalls.forEach(wall => {
            wall.update();
        })
        
        // Draw the boss on floor 5
        if(this.game.floorNum == 5) {
            this.game.boss.display();
        }
        
    }
}

class Game {
    constructor() {
        // Reset the world
        World.clear(engine.world);
        Engine.clear(engine);
        engine.events = {};
        
        this.timeSinceStart = 0;
        this.deaths = 0;
        this.deathSceneTimer = 0;
        
        this.bullets = [];
        this.enemies = [];
        this.blocks = [];
        this.pastPlayers = [];
        this.powerups = [];
        
        this.player = new Player(this);
        this.manager = new LevelManager(this)
        this.display = new Display(this);
        this.camera = new Camera(this.player)
        this.boss = new Boss(this);
        
        trans.game = this;
        
        this.ghoulDialogue = [
            new Ghoul_Message('Ah... what\'s this? Another challenger, come to climb my tower.'),
            new Ghoul_Message('Another soul to join the countless I\'ve claimed.'),
            new Ghoul_Message('So many have come before you—I\'ve lost count.'),
            new Ghoul_Message('How long since the last one? Years... centuries, perhaps.'),
            new Ghoul_Message('Like all, you come to kill me.'),
            new Ghoul_Message('Foolish human. You cannot kill a keeper of time'),
            new Ghoul_Message('I have watched kings rot into dust and empires crumble.'),
            new Ghoul_Message('Time conquers all.'),
            new Ghoul_Message('So climb, little mortal, if you must.'),
            new Ghoul_Message( 'I will greet you at the top'),
        ];
        this.ghoulDialogueInd = 0;
        this.ghoulTimer = 0;

        this.blocksDestroyed = 0;
        
        this.expandingLevel = false;
        this.loopNum = 1;
        this.floorNum = 1;
        this.paused = false;
        this.floorDone = false;
        
        this.manager.init();
        this.pendulum = new Pendulum({x: 300, y: height/2-this.manager.levelHei/2-300})
        
        Events.on(engine, 'beforeUpdate', () => {
            Composite.allBodies(engine.world).forEach(body => {
                var gravity = engine.world.gravity;
                if (body.noGravity) {
                    Body.applyForce(body, body.position, {
                        x: -gravity.x * gravity.scale * body.mass,
                        y: -gravity.y * gravity.scale * body.mass
                    });
                }
                
            });
        });
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs
            
            for(let pair of pairs) {
                let { bodyA, bodyB } = pair;
                
                if (bodyA.object && typeof bodyA.object.handleCollisions === 'function') {
                    bodyA.object.handleCollisions(bodyB, 'start', pair.collision.normal)

                }
                if (bodyB.object && typeof bodyB.object.handleCollisions === 'function') {
                    bodyB.object.handleCollisions(bodyA, 'start', pair.collision.normal, bodyB)
                }
            }
            
        });
        Events.on(engine, 'collisionActive', (event) => {
            const pairs = event.pairs
             
            
            for(let pair of pairs) {
                let { bodyA, bodyB } = pair;
                
                if (bodyA.object && typeof bodyA.object.handleCollisions === 'function') {
                    bodyA.object.handleCollisions(bodyB, 'active', pair.collision.normal)
                }
                if (bodyB.object && typeof bodyB.object.handleCollisions === 'function') {
                    bodyB.object.handleCollisions(bodyA, 'active', pair.collision.normal)
                }
            
            }
           
        });
        Events.on(engine, 'collisionEnd', (event) => {
            const pairs = event.pairs
            
            for(let pair of pairs) {
                let { bodyA, bodyB } = pair;
            
                if (bodyA.object && typeof bodyA.object.handleCollisions === 'function') {
                    bodyA.object.handleCollisions(bodyB, 'end', pair.collision.normal)
                }
                if (bodyB.object && typeof bodyB.object.handleCollisions === 'function') {
                    bodyB.object.handleCollisions(bodyA, 'end', pair.collision.normal)
                }
                
                
                
            }
        })
    }
    respawn() {
        this.player.health = this.player.maxHealth;
        this.player.powerupActive = false;
        this.player.powerups = [false, false, false];
        this.deaths++;
        this.initLevel();
        
        if(this.floorNum === 5) {
            World.remove(engine.world, this.boss.body)
            this.boss = new Boss(this);
        }
    }
    initLevel() {
        this.loopNum = 1;
        this.startLevelCount = 50;
        this.pastPlayers = [];
        this.player.timeline = [];
        
        this.timeSinceStart = 0;
        
        this.enemies.forEach(enemy => {
            World.remove(engine.world, enemy.body)
            
            if(enemy instanceof Wraith) {
                World.remove(engine.world, [enemy.chain, enemy.arm, enemy.ball, enemy.ballConstraint])
            }
        })
        this.enemies = [];
        
        this.bullets = clearArray(this.bullets)
        this.blocks = clearArray(this.blocks);
        this.powerups = clearArray(this.powerups)

        this.manager.init();
        this.manager.viewWidth = 250;
        Body.setPosition(this.manager.movingWalls[1].body, {x: (width/2+this.manager.viewWidth/2)+500/2, y: height/2});
        Body.setPosition(this.manager.movingWalls[0].body, {x: width/2-this.manager.viewWidth/2-500/2, y: height/2});
        
        if(settingConfig.easyMode) this.player.health = constrain(this.player.health+2, 0, this.player.maxHealth)
        
        if(this.floorNum === 4) {
            this.pendulum.rot = 40;
            Body.setPosition(this.pendulum.bob, {x: this.pendulum.x+cos(this.pendulum.rot)*this.pendulum.len, y: this.pendulum.y+sin(this.pendulum.rot)*this.pendulum.len})
        }
    }
    initLoop() {
        // Init past players and create more
        this.pastPlayers.forEach(p => {
            p.currFrame = 0;
        })
        this.pastPlayers.push(new Past({type: 'player', timeline: this.player.timeline, startFrame: 0}))
        
        // Reset objects
        this.bullets.forEach((bullet, i) => {
            if(bullet.img === 'bullet') {
                bullet.reset();
            }
        })
        this.enemies.forEach(enemy => {
            if(enemy instanceof Ghost || enemy instanceof Spider) {
                enemy.reset(enemy.past ? undefined : this.pastPlayers[this.pastPlayers.length-1]);
            }
        })
        this.enemies.filter(e => !(e instanceof Flying_Clock))
        
        this.player.timeline = [];
        
        
        this.timeSinceStart = 0;
        
        this.loopNum++;
        this.expandingLevel = true;
        
        this.manager.floors[this.floorNum-1].enemySpawn = floor(this.manager.floors[this.floorNum-1].enemySpawn-this.loopNum*1.5)
    }
    destroyFloor() {
        // Get the blocks to destroy
        let destroyBlocks = this.blocks.filter(block => dist(block.x, block.y, this.boss.x, this.boss.y) > 350 && block.body.label == 'distroyBlock')
        destroyBlocks = destroyBlocks.concat(this.blocks.filter(block => dist(block.x, block.y, this.boss.x, this.boss.y) > 350 && block.body.collisionFilter.category === category.passThrough))
        let blockToDestroy = destroyBlocks[floor(random(0, destroyBlocks.length))]
        
        blockToDestroy.beingDestroyed = 70;
        this.blocksDestroyed++;
    }
    updateObjects() {
        // Reset stopped
        this.player.stopped = false;
        
        // Update all the main objects
        this.pastPlayers.forEach(p => {
            p.update();
        })
        this.enemies.filter(e => !e.dead).forEach((enemy, i) => {
            // Check if interacting with slow time powerup
            if(this.player.powerupActive === 'slow_time' && dist(enemy.x, enemy.y, this.player.x, this.player.y) < this.player.timeDiam/2) {
                enemy.speed = enemy.startSpeed * 0.2;
            }
            
            // Update if not dead
            if(!enemy.dead) {
                enemy.update();
            }
            
            // Remove enemies if dead
            if((enemy instanceof Wraith && enemy.dead) || (enemy instanceof Flying_Clock && enemy.onGround) ) {
                World.remove(engine.world, enemy.body);
                this.enemies.splice(i, 1);
                
                if(enemy instanceof Wraith) {
                    World.remove(engine.world, [enemy.chain, enemy.arm, enemy.ball, enemy.ballConstraint])
                }
            }
            if(enemy instanceof Spiderling && enemy.dead) {
                World.remove(engine.world, enemy.body);
                this.enemies.splice(i, 1);
            }
        })
        this.bullets.filter(b => !b.dead).forEach((bullet, i) => {
            if(!bullet.dead) {
                bullet.update();
                
                if(bullet.x < -this.manager.levelWid || bullet.x > this.manager.levelWid || bullet.y < -this.manager.levelHei || bullet.y > this.manager.levelHei+100 && bullet instanceof Projectile) {
                    bullet.die();
                }
            }
            
            // Check if interacting with slow time powerup
            if(this.player.powerupActive === 'slow_time' && dist(bullet.x, bullet.y, this.player.x, this.player.y) < this.player.timeDiam/2 && (bullet.from === 'enemy' || bullet.past)) {
                bullet.speed = bullet.startSpeed * 0.2;
            }
            
            if(bullet instanceof Time_Bomb && debug.timeBombs) {
                if(dist(this.player.x, this.player.y, bullet.x, bullet.y) < bullet.rad/2-10) {
                    this.player.stopped = true;
                    this.player.setVelocity(0, 0)
                }
                if(bullet.dead) {
                    World.remove(engine.world, bullet.body)
                    this.bullets.splice(i, 1)
                }
            }
    })
        this.player.update(this.timeSinceStart);
        
       
        // Update the boss if on floor 5
        if(this.floorNum == 5) {
            this.boss.body.collisionFilter.category = category.enemy;
            this.boss.update();
        }
        else {
            this.boss.body.collisionFilter.category = category.nothing;
        }
    }
    ghoulMessage() {
        
        this.ghoulDialogue[this.ghoulDialogueInd].display(true);
        if(this.ghoulDialogueInd > 0) this.ghoulDialogue[this.ghoulDialogueInd-1].display(false);
        
        if(this.ghoulDialogueInd === 0) {
            text('Click >>', -3, 62)
        }
        
        if(this.ghoulDialogueInd < this.ghoulDialogue.length) {
            if(mouse.clicked) this.ghoulDialogueInd++;
        }
        
        
    }
    addEnemies() {
        if((this.manager.levelData.dur*60 - this.timeSinceStart) > 0 && debug.enemies && this.timeSinceStart >= 25 && this.timeSinceStart % this.manager.floors[this.floorNum-1].enemySpawn == 25 && !this.floorDone) {
            const points = this.manager.getSpawnPoints()
            
            let spawnPoint = points[floor(random(0, points.length))]
            const enemy = weightedRandom(this.manager.levelData.enemies.e, this.manager.levelData.enemies.p)
            
            this.enemies.push(new enemy({
                x: spawnPoint.x, y: spawnPoint.y, 
                timeSinceStart:this.timeSinceStart, 
                target:this.player,
            }, this))
        }
    }
    addPowerups() {
        if(debug.powerups && this.powerups.length < 5 && random(0, 1) <= 0.002) {
            const blocks = this.blocks.filter(b => b.img && (b.img === 'platform' || b.img.includes('pipe')))
            const block = blocks[floor(random(0, blocks.length))]
            
            this.powerups.push(new Powerup({
                x: block.x, y: block.y-40
            }))
        }
        if(this.floorNum !== 5 && random(0, 1) <= ((settingConfig.easyMode ? 0.002 : 0.0005)*this.floorNum) && this.powerups.filter(p => p.type == 'health').length < 8) {
            const blocks = this.blocks.filter(b => b.img && (b.img === 'platform' || b.img.includes('pipe')))
            const block = blocks[floor(random(0, blocks.length))]
            
            this.powerups.push(new Powerup({
                x: block.x, y: block.y-40,
                type: 'health'
            }))
        }
    }
    update() {
        // Control the camera
        this.camera.startScope();
        this.camera.handle(this.manager.levelWid, this.manager.levelHei);
       
        // Update everything
        if(!this.paused) {
            this.updateObjects();
            
            // Add powerups and enemies
            this.addPowerups();
            if(this.floorNum !== 5) {
                this.addEnemies();
                
                this.floorDone = this.loopNum >= this.manager.levelData.loopNum && this.timeSinceStart > this.manager.levelData.dur && this.enemies.every(enemy => enemy.dead)
            
                if(this.floorDone && this.player.y < height/2-this.manager.levelHei/2 && !trans.running) {
                    trans.start(() => {
                        this.floorNum++;
                        this.initLevel();
                    })
                }
            
                if(this.enemies.every(enemy => enemy.dead) && this.timeSinceStart > this.manager.levelData.dur*60 && this.loopNum < this.manager.levelData.loopNum) {
                    this.initLoop();
                } 
            }
            else {
                this.loopNum = 10;
                this.expandingLevel = true;
                
                // Start boss falling apart
                if(this.boss.health <= 0) {
                    this.deathSceneTimer++;
                    
                    this.bullets.filter(b => !b.dead).forEach(b => b.die())
                    this.camera.scale = lerp(this.camera.scale, 0.8, 0.05)
                }
                
                // Add new ghould dialogue
                if(this.timeSinceStart > 45 && this.ghoulDialogue.length === 10) {
                    this.ghoulDialogue.push(new Ghoul_Message('Ah so the human did make it up the tower'))
                    this.ghoulDialogue.push(new Ghoul_Message('With nothing but a gun? Impressive'))
                    this.ghoulDialogue.push(new Ghoul_Message('Your trials are not over yet though'))
                }
                this.ghoulTimer = 0;
            }
        
            
            this.timeSinceStart++;
            
        }
        else {
            this.bullets.filter(b => !b.dead).forEach((bullet, i) => {
                bullet.setVelocity(0, 0)
            })
        }
        
        // Draw all objects
        this.display.drawObjects();
        
        // Expand level
        if(this.expandingLevel) {
            this.manager.expand();
        }
    
        
        // Pause when 'p' clicked
        if(input.click('Pause')) {
            this.paused = !this.paused;
        }
        
        // Respawn when 'r' clicked
        if(input.click('Respawn')) {
            trans.start(() => {
                 this.respawn();
                scene = 'game';
            });
        }
        
        this.display.drawLevelOverlays();
        
        // Handle the pendulum
        if(this.floorNum === 4) {
            this.pendulum.bob.collisionFilter.category = category.obstacle
            this.pendulum.update();
        }
        else {
            this.pendulum.bob.collisionFilter.category = category.nothing
        }
        
        this.camera.endScope();
        
        this.display.drawStatusBar();
        
        // Handle the ghoul dialogue
        if(debug.ghoulTalk && ((this.floorNum === 1 && this.loopNum === 2) || (this.floorNum === 5)) && this.ghoulDialogueInd < this.ghoulDialogue.length) {
            if(this.ghoulTimer > 60) {
                this.ghoulMessage();
            } else {
                this.ghoulTimer++;
            }
            
            this.paused = true;
        }
        else if(this.ghoulTimer > 0) {
            this.ghoulTimer--;
            this.paused = false;
        }
        
        if(this.paused) {
            this.player.setVelocity(0, 0)
            this.player.body.noGravity = true;
            
            fill(colors.DARK, 90)
            rect(width/2, height/2, width, height)
            
            if(this.ghoulTimer <= 0) {
            fill(colors.LIGHT)
            rect(width/2-30, height/2, 30, 100)
            rect(width/2+30, height/2, 30, 100)
            }
        }
        
        // Go to death scene
        if(debug.death && this.player.health <= 0 && !trans.running) {
            this.player.setVelocity(0, 0)
            trans.start(() => {
                
                Scenes.initDeath();
                scene = 'death'
            })
        }
        
        this.startLevelCount--;
        
        
    }
}
