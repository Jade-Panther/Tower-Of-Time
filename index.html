// Drawing functions
function drawPixelArt(drawing, palette, pixSize) {
    var w = drawing[0].length;
    var h = drawing.length;
    if (pixSize === undefined) {
        var pixSize = min(width / w, height / h);
    }
    pixSize = round(pixSize);
    var img = createGraphics(w * pixSize, h * pixSize, P2D);
    img.background(0, 0, 0, 0);
    img.noStroke();
    for (var row = 0; row < drawing.length; row++) {
        for (var colm = 0; colm < drawing[row].length; colm++) {
        var char = drawing[row][colm];
        if (char !== ' ') {
            img.fill(palette[char]);
            img.rect(colm * pixSize, row * pixSize, pixSize, pixSize);
        }
        }
    }
    return img.get(0, 0, w * pixSize, h * pixSize);
};
function PixelAnimation(group) {
    this.frameCount = 0;
    this.group = group;
    this.onceFrameCount = 0;
    this.onceFrame = 0;
};
PixelAnimation.prototype.run = function(x, y, wid, speed, imgArr, type) {
    var ia = imgArr;
    var imgArr = animateArt[this.group][imgArr] ? animateArt[this.group][imgArr] : animateArt[this.group]
    var currentFrame = 0;
    
    if(type === 'backward') {
        imgArr = [...imgArr].reverse()
    }
    
    if(speed != 0) {
        if (type === 'once') {
            this.onceFrame = floor((this.onceFrameCount) / speed);
            
            if (this.onceFrame >= imgArr.length) {
                this.onceFrame = imgArr.length - 1;
            }
            else {
                this.onceFrameCount++
            }
        } 
        else if (type === 'bounce') {
            var maxFrame = imgArr.length - 1;
            if (this.frameCount % (speed * maxFrame * 2) < speed * maxFrame) {
            currentFrame = floor(this.frameCount / speed) % maxFrame;
            } else {
            currentFrame = maxFrame - floor(this.frameCount / speed % maxFrame);
            }
            this.onceFrameCount = 0;
        } 
        else {
            currentFrame = floor(this.frameCount / speed) % imgArr.length;
            this.onceFrameCount = 0;
        }
    }
    
    this.img = imgArr[type == 'once' ? this.onceFrame : currentFrame]

    image(this.img, x, y, wid, wid * this.img.height / this.img.width);
    this.wid = wid;
    
    if(!theGame.paused) {
        this.frameCount++;
    }
};
function drawStaticArt(x, y, wid, img, frame, past) {
    if(!frame) image(staticArt[img], x, y, wid, wid * staticArt[img].height / staticArt[img].width);
    else if(past) past.image(staticArt[img], x, y, wid, wid * staticArt[img].height / staticArt[img].width)
    else image(img, x, y, wid, wid * img.height / img.width);
}

// Useful functions
function wrapText(str, wid) {
    const words = str.split(' ')
    let wrapped = ''
    let line = '';
    
    words.forEach(word => {
        if(textWidth(line + word) > wid) {
            wrapped += line.trim() + '\n';
            line = word + ' ';
        }
        else {
            line += word + ' '
        }
    })
      
    return wrapped + line.trim();
}
function weightedRandom(items, weights) {
    /* Takes a list of items and a list of weights. Uses the weights to choose from the list randomly */
    const cumulWeights = [];
    for(let i = 0; i<weights.length; i++) {
        cumulWeights.push(weights[i] + (cumulWeights[i-1] || 0))
    }
    
    const rand = random(0, cumulWeights[cumulWeights.length-1])
    for(let i = 0; i<items.length; i++) {
        if(cumulWeights[i] >= rand) {
            return items[i]
        }
    }
}
function formatTime(time) {
    return (time / 60).toFixed(2)
}
function makeSound(soundFile, volume, speed, doChangePitch, startTime) {
    // From Cyan Spirit's sound maker
    var sound = soundFile.audio;
    sound.volume = volume;
    sound.playbackRate = speed;
    sound.preservesPitch = !doChangePitch;
    sound.currentTime = startTime * sound.duration;
    return sound
}
function playSound(file) {
    // Play the sound if on
    if(settingConfig.soundOn && sounds[file]) {
        sounds[file].play();
    }
}
function clearArray(array) {
    // Clear the array and clear the body from the world
    array.forEach(i => {

    })
    array = [];
    return array;
}

class Mouse {
    constructor() {
        this.clicked = false;
        this.pressed = false;
        this.x = mouseX; 
        this.y = mouseY;
        
        document.addEventListener("mouseup", (e) => {
            this.clicked = true;
        });
    }
    update() {
        this.clicked = false;
        this.x = mouseX;
        this.y = mouseY;
    }
    overRect(x, y, wid, hei) {
        return mouseX > x-wid/2 && mouseX < x+wid/2 && mouseY > y-hei/2 && mouseY < y+hei/2;
    }
    overCircle(x, y, diam) {
        return dist(mouseX, mouseY, x, y) < diam/2;
    }
}

        });

            this.clicked[e.key] = true;
           
        });
    }

        Object.keys(this.clicked).forEach(key => {

        })

       return this.keyMap[action].map(key => this.pressed[key]).some(key => key)
    }
    click(action) {
       return this.keyMap[action].map(key => this.clicked[key]).some(key => key)
    }
}

class Transition {
    constructor() {
        this.action = () => {};
        this.fade = 0;
        this.timer = 0;
        this.speed = 4;
        this.running = false;
    }
    start(action) {
        this.running = true;
        this.action = action;
        this.timer = 0;
        this.fade = 0;
    }
    run() {
        rectMode(CENTER)
        fill(colors.DARK, this.fade);
        rect(width/2, height/2, width, height);
        
        if(this.timer < 256) {
            this.fade+=this.speed;
        }
        else if(this.timer === 256) {
            this.action();
        }
        else {
            this.fade-=this.speed;
        }
        
        if(this.fade === 0 && this.timer > 10) {
            this.running = false;
        }
        
        this.timer+=this.speed;
    }
}

const Particles = (function() {
    /* The individual particles */
    const _Particle = function(config) {
        this.x = config.x;
        this.y = config.y;
        this.xVel = config.xv;
        this.yVel = config.yv;
        this.opacity = config.o || 255;
        this.fadeSp = config.fs;
        this.fadeMore = config.fm !== undefined ? config.fm : true;
        this.size = config.s;
        
        this.gravity = config.grav || false;
        this.col = colors.LIGHT;
    };
    _Particle.prototype.display = function() {
        pushMatrix();
        translate(this.x, this.y)
            fill(this.col, this.opacity);
            rect(0, 0, this.size, this.size);
        popMatrix();
    };
    _Particle.prototype.update = function() {
        this.x += this.xVel;
        this.y += this.yVel;
        
        if(this.gravity) {
            this.yVel += 0.05;
        }
        
        if(this.fadeMore) {
            this.fadeSp += 0.06
        }
        
        this.opacity -= this.fadeSp;
        
        this.display();
    };
    
    /* Handles a particle source */
    let _Particles = [];
    _Particles.create = function(config) {
        if((frameCount % config.spawn === 0 || !config.spawn) && random(0, 1) < 0.5) {

            this.push(new _Particle(config));
        }
    };
    _Particles.run = function() {
        for(var i = 0; i<this.length; i++) {
            this[i].update();
            if(this[i].opacity <= 0) {
               this.splice(i, 1);
            }
        }
    };
    
    return _Particles;
})();

class PhysicsObject {
    constructor(config) {
        this.x = config.x;
        this.y = config.y;
        this.wid = config.wid;
        this.hei = config.hei;
        this.group = config.group;

        this.body = config.body || Bodies.rectangle(this.x, this.y, this.wid, this.hei, {isStatic: config.static | false, object:this})
        
        World.add(engine.world, this.body);

        this.updatePos();
    }
    updatePos() {
        this.x = this.body.position.x;
        this.y = this.body.position.y;
    }
    setAcceleration(xAcc, yAcc) {
        Body.setVelocity(this.body, {
            x: this.body.velocity.x + (xAcc || 0),
            y: this.body.velocity.y + (yAcc || 0),
        });
    }
    setPosition(xPos, yPos) {
        Body.setPosition(this.body, {
            x: (xPos !== undefined) ? xPos : this.body.position.x,
            y: (yPos !== undefined) ? yPos : this.body.position.y,
        })
    }
    setVelocity(xVel, yVel) {
        Body.setVelocity(this.body, {
            x: (xVel !== undefined) ? xVel : this.body.velocity.x,
            y: (yVel !== undefined) ? yVel : this.body.velocity.y,
        });
    }
}

class Projectile extends PhysicsObject {
    constructor(config) {
        super(config);
        this.from = config.from;
        
        Matter.Body.set(this.body, {
            restitution: 0.8,
            friction: 0,
            frictionAir: 0,
            collisionFilter: {
                category: category.projectile,
                mask: category.player | category.wall | category.enemy | category.shield | category.passThrough | category.projectile,  
                group: 0
            },
            noGravity: config.noGrav === undefined ? true : config.noGrav,
            isSensor: true,
        });
        
        this.angle = config.angle;
        this.speed = config.speed || (settingConfig.easyMode ? 2.5 : 3.5);
        this.startSpeed = this.speed;
        this.setVelocity(cos(this.angle)*this.speed*1.5, sin(this.angle)*this.speed*1.5);
        this.img = staticArt[config.img] ? config.img : new PixelAnimation('boss_bullet');
        this.spawnData = {
            x: config.x,
            y: config.y,
            angle: this.angle,
            startFrame: config.timeSinceStart,
        }
        this.past = config.past;
        this.waitTime = 0;
        this.bouncing = false;
        this.bounceWait = 0;
        this.bouncedAlready = false;
        this.bouncedNumber = 0;
        this.dead = false;
    }
    handleCollisions(otherBody, type, norm) {
        let obj = otherBody.object;
        let cat = otherBody.collisionFilter.category;
        
        if(type == 'start') {
            // Bounce or die if hitting shield/wall
            if(!this.dead && (cat === category.wall || cat === category.shield) && this.waitTime <= 0 && this.bounceWait <= 0 && this.from == 'player' && (cat !== category.shield || (cat === category.shield && this.bouncedAlready))) {
                if(this.wid === 20) {
                    this.die();
                }
                else {
                    this.bounce(norm);
                }
            }
            
            // Die if hit another player bullet
            if(cat === category.projectile && this.from === 'player' && obj.from === 'player' && this.waitTime <= -10 && obj.waitTime <= -10 && !obj.dead && !this.dead) {
                this.die();
                obj.die();
            }
            
            // Die if hitting player shield
            if(cat === category.shield && this.from === 'enemy' && !this.dead) {
                this.die();
                this.setVelocity(0, 0)
            }
        }
    }
    reset() {
        // Reset everything to the spawn data
        Body.setPosition(this.body, {x:this.spawnData.x, y:this.spawnData.y})
        this.setVelocity(0, 0);
        this.dead = false;
        this.past = true;
        this.angle = this.spawnData.angle
        this.waitTime = this.spawnData.startFrame;
    }
    display() {
        // Draw the bullet
        if(this.waitTime <= 0) {
            pushMatrix();
            translate(this.x, this.y);
            rotate(this.angle);
                
                if(this.img instanceof PixelAnimation) {
                    this.img.run(0, 0, this.wid, 10);
                }
                else {
                    drawStaticArt(0, 0, this.wid, this.img)
                }
            popMatrix();
        }
    }
    bounce(normal) {
        // Play the bounce song
        playSound('hit2')
        
        // Get the normal to bounce correctly
        if(normal.x != 0) {
            this.setVelocity(-this.body.velocity.x, this.body.velocity.y)
        }
        if(normal.y != 0) {
            this.setVelocity(this.body.velocity.x, -this.body.velocity.y)
        }
        
        // Set the angle
        this.angle = atan2(this.body.velocity.y, this.body.velocity.x)
        this.bounceWait = 5;
        this.bouncedAlready = true;
        this.bouncedNumber++;
        
        // If on easy mode and bounces more than 3 times, die
        if(settingConfig.easyMode && this.bouncedNumber > 3) {
            this.die();
        }
    }
    die() {
        // Release particles
        for(var i = 0; i<10; i++) {
            Particles.create({
                x: this.x,
                y: this.y,
                xv: random(-1, 1),
                yv: random(-1, 1),
                o: this.past ? 100 : 200,
                //grav: true,
                s: random(2, 7),
                fs: 2
                
            })
        }
        this.setVelocity(0, 0)
        this.dead = true;
    }
    update() {
        this.updatePos();
    
        if(this.body.noGravity) {
            if(this.waitTime <= 0) {
                
                this.setVelocity(cos(this.angle)*this.speed, sin(this.angle)*this.speed)
                this.xVel = this.body.velocity.x;
                this.yVel = this.body.velocity.y;
                
               // this.display();
            }
            else {
                //Body.setVelocity(this.body, {x: 0, y: 0})
                this.setVelocity(0, 0)
            }
        }
        else {
            this.angle = atan2(this.body.velocity.y, this.body.velocity.x)
        }
        
        this.bouncing = false;
        this.speed = this.startSpeed;
        
        this.waitTime--;
        this.bounceWait--;
    }
}

class Time_Bomb extends PhysicsObject {
    constructor(config) {
        super(config);
        Matter.Body.set(this.body, {
            restitution: 0.4,
            frictionAir: 0.01,
            collisionFilter: {
                category: category.nothing, 
                mask: category.player | category.wall | category.enemy | category.passThrough,  
                group: 0
            },
            
        });
        this.dead = false;
        this.range = config.range;
        this.height = config.height;
        this.fallTime = sqrt(2 * (this.height) / 0.2)
        this.rad = 0;
        this.maxRad = 200;
        this.active = false;
        this.time = 0;
        this.angle = config.angle || 0;
        
        const sin2theta = sin(2 * this.angle) || 0.001;

        // Get speed based on angle to player
        this.speed = sqrt((this.range * engine.world.gravity.y) / sin2theta);
        
        // Set the velocity to reach player
        let xv = cos(this.angle)*this.vel
        let yv = sin(this.angle)*this.vel;
        
        this.setVelocity(this.range/ this.fallTime, 0)
    }
    handleCollisions(otherBody, type) {
        let obj = otherBody.object;
        let cat = otherBody.collisionFilter.category;
        
        if(type === 'start') {
            if(cat === category.wall || cat === category.passThrough) {
                this.active = true;
            }
        }
    }
    die() {
        this.dead = true;
    }
    display() {
        
        drawStaticArt(this.x, this.y, 20, 'time_bomb')
        
        fill(colors.LIGHT, 40)
        ellipse(this.x, this.y, this.rad, this.rad)
        
        if(this.active && !this.dead) {
            for(let i = 0; i<360; i++) {
                if(random(0, 1) < 0.005) {
                    Particles.create({
                    x: this.x + cos(i)*this.rad/2,
                    y: this.y + sin(i)*this.rad/2,
                    xv: cos(i)*random(-0.5, 0.5),
                    yv: sin(i)*random(-0.5, 0.5),
                    fs: 1,
                    s: random(2, 5),
                })
                }
            }
        }
    }
    update() {
        this.updatePos();
        
        if(this.fallTime-this.time < 20) {
            this.body.collisionFilter.category = category.bomb
        }
        
        if(this.time < 200) {
            if(this.active && this.rad < this.maxRad) {
                this.rad+=3;
            }
        }
        else {
            this.rad -= 5;
        }
        
        if(this.rad < 0) {
            this.die();
        }
        
        this.time++;
    }
}

    }
    handleCollisions(otherBody, type) {
        let obj = otherBody.object;
        let cat = otherBody.collisionFilter.category;
        
        // Handle the different collisions by type
        if(type === 'start') {
            // Go on latter
            if(cat === category.ladder) {
                if ((input.press('Up') || input.press('Down'))) {
                    
                    this.onLadder = true;
                }
                this.ladderCount++;
            }
        
            // Collide with enemy projectiles
            if(cat === category.projectile && obj.from === 'enemy' && obj.waitTime <= 0 && !obj.dead) {
                this.takeDamage(0.5)
                obj.die();
            }
            
            // Shake camera when land
            if ([category.wall, category.passThrough, category.obstacle].includes(cat) && this.body.velocity.y > 2) {
               this.game.camera.shake(5, map(this.body.velocity.y, 0, 8, 0.5, 2));
               playSound('jump')
            }
            
            // Collide with your own bullet
            if(cat === category.projectile && obj.from === 'player' && !obj.dead && this.reloadWait <= 0 && obj.waitTime <= 0) {
                
                
                this.takeDamage(0.5)
                obj.die()
            }
            
            // Collide with spiderling
            if(cat === category.enemy && obj instanceof Spiderling) {
                this.takeDamage(0.5)
            }
            
            // Collide with gears
            if(cat === category.fallingGear) {
                this.takeDamage(1)
            }
            
            // Collide with floor gears (boss level)
            if(obj instanceof Gear && obj.dangerous) {
                
                this.takeDamage(0.5)
            }
            
            // Get hit by wraith weapon
            if(cat === category.chainWeapon && !obj.dead && obj.waitTime <= 0 && obj.opacity >= 0.8) {
                this.takeDamage(1)
            }
            
            // Collect powerups
            if(cat === category.powerup && !obj.collected) {
                if(obj.type === 'health' && this.health < this.maxHealth) {
                    this.health = constrain(this.health+1, 0, this.maxHealth)
                    obj.collected = true;
                    playSound('powerup')
                }
                else if(obj.type !== 'health') {
                    for(let i = 0; i<this.powerups.length; i++) {
                        if(this.powerups[i] === false) {
                            this.powerups[i] = obj.type;
                            obj.collected = true;
                            playSound('powerup')
                            break;
                        }
                    }
                }
            }
            
            // Take damage when hit pendulum
            if(cat === category.obstacle && obj instanceof Pendulum) {
                this.takeDamage(0.5)
            }
        }
        else if(type === 'active') {
            // Ghost attack
            if(obj instanceof Ghost && !obj.dead && frameCount % 20 === 0 && obj.waitTime <= 0) {
               
                this.takeDamage(0.5)
            }
            
            // Add particles when moving
            if([category.wall, category.passThrough, category.obstacle].includes(cat) && abs(this.body.velocity.x) > 1) {
                Particles.create({
                    x: this.x+random(-5, 5),
                    y: this.y+30,
                    xv: random(0.5, 1)*Math.sign(this.body.velocity.x),
                    yv: random(-1, -2),
                    fs: 2,
                    o: 150,
                    s: random(2, 6),
                    spawn: 10,
                    grav: true
                })
            }
            
        }
        else if(type === 'end') {
            if (cat === category.ladder) {
                this.ladderCount = Math.max(0, this.ladderCount - 1);
                if (this.ladderCount === 0) {
                    this.onLadder = false;
                }
            }
        }
    }
    takeDamage(amt) {
        // Take damage if not hurt
        if(this.hurt <= 0) {
            this.hurt = 25;
            this.health-=amt;
            this.health = constrain(this.health, 0, this.maxHealth)
            playSound('hit')
        }
    }
    displayPowerupEffects() {
        if(this.powerupActive === 'slow_time')  {
            fill(colors.LIGHT, this.powerupCount > 100 || (this.powerupCount % 10 < 7)? 50 : 10)
            
            // Draw the circle where time is slowed
            this.timeDiam = constrain(map(this.powerupCount, 500, 400, 0, 400), 0, 400);
            ellipse(this.slowTimePos.x, this.slowTimePos.y, this.timeDiam, this.timeDiam);
            
            // Add particles
            for(let i = 0; i<360; i++) {
                if(random(0, 1) < 0.02) {
                    Particles.create({
                    x: this.slowTimePos.x + cos(i)*this.timeDiam/2,
                    y: this.slowTimePos.y + sin(i)*this.timeDiam/2,
                    xv: cos(i)*random(-0.5, 0.5),
                    yv: sin(i)*random(-0.5, 0.5),
                    fs: 1,
                    s: random(2, 5),

                })
                }
            }
            this.powerupCount--;
        }
        
    }
    display() {
        // Flicker when hurt
        if(this.hurt > 0 && this.hurt % 10 <= 4) {
            ctx.globalAlpha = 0.5;
        }
        
        // Translate everything for better positioning
        pushMatrix();
        translate(this.body.position.x, this.body.position.y-3);
        
        // Move the arm if not stopped
        if(!this.game.paused && !this.stopped) {
            // Calculate the arm angle
            this.armAngle = atan2(mouse.y - this.y+7, mouse.x - this.x-10)
            
            // Change the direction depending on the arm angle
            this.dir = this.armAngle > -90 && this.armAngle < 90 ? 1 : -1;
        }
        
        // Draw the arm and gun
        pushMatrix();
        translate(8*this.dir, -5)
        scale(1, this.dir);
        rotate(this.armAngle*this.dir)
            imageMode(CORNER)
            if(!this.onLadder) drawStaticArt(0, -7, 45, 'arm')
            imageMode(CENTER)
        popMatrix();
        
        // Draw the player body
        scale(this.dir, 1);
        if(!this.stopped) {
            var type = this.dir === 1 ? 'once' : 'back'
            let xVel = this.body.velocity.x;
            let yVel = this.body.velocity.y;
            
            // Climbing animation
            if(this.onLadder) {
                if(abs(yVel) > 0.1) {
                    this.art.run(0, 0, 31, 15, 'climb')
                }
                else {
                    this.art.run(0, 0, 31, 0, 'climb')
                }
                this.wid = 31;
            }
            
            // If on the ground
            else if(this.numJumps == 0 && yVel < 0.1) {
                if(abs(xVel) > 0.1) {
                    this.art.run(0, 0, 56, 10, 'move', Math.sign(this.dir) !== Math.sign(this.body.velocity.x) ? 'backward' : '');
                }
                else {
                    this.art.run(0, 0, 28, 15, 'idle');
                }
            }
            
            // Else jumping
            else {
                // Jumping up
                if(yVel < -1) {
                    if(abs(xVel) < 0.05) {
                        this.art.run(0, 0, 28, 8, 'jump1')
                    }
                    else {
                        this.art.run(0, 0, 58, 8, 'jump2')
                        this.wid = 58;
                    }
                }
                
                // Jumping down
                else {
                    if(abs(xVel) > 0.5) {
                        if(yVel > 0.8) {
                            this.art.run(0, 0, 50, 8, 'fall3', 'once')
                        } 
                        else {
                            this.art.run(0, 0, 58, 8, 'jump2')
                        }
                    }
                    else if(abs(yVel) < 1) {
                        this.art.run(-7, 0, 43, 8, 'fall2')
                    }
                    else {
                        this.art.run(-7, 0, 38, 8, 'fall1')
                    }
                }
            }
        }
        else {
            drawStaticArt(0, 0, this.art.wid, this.art.img, true)
        }
        
        popMatrix();
    
        ctx.globalAlpha = 1;
        
        // Draw the shield if active
        if(this.powerupActive === 'shield') {
            // Update the shield
            Composite.allBodies(this.shield).forEach((body, i) => {
                body.collisionFilter.category = category.shield;
                const x = this.body.position.x;
                const y = this.body.position.y
                const angle = atan2(mouse.y-y, mouse.x-x)+i*10-50
                Body.setAngle(body, angle)
                Body.setPosition(body, {x: x+cos(angle)*60, y: y+sin(angle)*60})
                
                pushMatrix();
                    translate(body.position.x, body.position.y);
                    rotate(body.angle);
                    fill(colors.RED)
                    //rect(0, 0, 30, 30)
                popMatrix();
            })
            
            pushMatrix();
            translate(this.x, this.y)
            // Rotate the shield based on mouse
            const allBodies = Composite.allBodies(this.shield)
            rotate(allBodies[floor(allBodies.length/2)].angle-7)
                drawStaticArt(51, 0, 34, 'shield')
            popMatrix();
            this.powerupCount--;
        }
        else if(this.shield !== undefined) {
            Composite.allBodies(this.shield).forEach(body => body.collisionFilter.category = category.nothing)
        }
    }
    shoot() {
        // Shake the screen a little
        this.game.camera.shake(5, 1);
        
        // Add extra bullets when using split shot
        if(this.powerupActive === 'split_shot') {
            this.game.bullets.push(new Projectile({
                x: this.x+cos(this.armAngle)*45,
                y: this.y+sin(this.armAngle)*45, 
                wid: 20,
                hei: 5,
                from: 'player',
                angle: this.armAngle-10,
                past: false,
                timeSinceStart: this.game.timeSinceStart,
                img: 'bullet'
            }))
            this.game.bullets.push(new Projectile({
                x: this.x+cos(this.armAngle)*45,
                y: this.y+sin(this.armAngle)*45-cos(this.armAngle)*10*this.dir,
                wid: 20,
                hei: 5,
                from: 'player',
                angle: this.armAngle+10,
                past: false,
                timeSinceStart: this.game.timeSinceStart,
                img: 'bullet'
            }))
            this.powerupCount--;
        }

        // Add main bullet
        this.game.bullets.push(new Projectile({
            x: this.x+cos(this.armAngle)*45,
            y: this.y+sin(this.armAngle)*45-10, 
            wid: 30,
            hei: 7,
            from: 'player',
            angle: this.armAngle,
            past: false,
            timeSinceStart: this.game.timeSinceStart,
            img: 'bullet'
        }))
        
        // Reset reload wait
        this.reloadWait = 10;
        
        playSound('shoot')
    }
    doPowerups(ind) {
        // Initalize powerupActive
        this.powerupActive = this.powerups[ind]
        this.powerups[ind] = false;
        
        // Initalize the effects
        switch(this.powerupActive) {
            case 'split_shot': {
                this.powerupCount = 3;
                break;
            }
            case 'slow_time': {
                this.powerupCount = 500;
                this.slowTimePos = {x: this.x, y: this.y};
                break;
            }
            case 'shield': {
                this.powerupCount = 700;
                
                // Initalize the shield if undefined
                if(this.shield === undefined) {
                    this.shield = Composite.create();
                    const radius = 100;
                    const startAngle = -50;
                    const segmentNum = 12;
                    const angleStep = (50 - startAngle) / segmentNum
                    // Add each segment
                    for(let i = 0; i<segmentNum; i++) {
                        let angle = startAngle + i * angleStep;
                        let nextAngle = angle + angleStep;
            
                        const x = this.body.position.x + cos(angle) * radius;
                        const y = this.body.position.y + sin(angle) * radius;
                       
                        const segment = Bodies.rectangle(
                            x, y,
                            10, 10,
                            {
                                collisionFilter: {
                                    category: category.shield,
                                    mask: category.projectile | category.enemy | category.chainWeapon,
                                    
                                },
                                angle: angle,
                                isStatic: true,
                            }
                        )
                        
                        Composite.add(this.shield, segment)
                    }
                    World.add(engine.world, this.shield)
                }
                break;
            }
        }
    }
    handleInput() {
        // Left and right
        if (input.press('Right')) {
            this.setAcceleration(0.5);
            this.dir = 1;
        } 
        else if (input.press('Left')) {
            this.setAcceleration(-0.5);
            this.dir = -1;
        }
        else {
            this.body.velocity.x = 0;
        }
        
        // Jump
        if (input.press('Up')) {       
            if (this.body.velocity.y > -6 && this.jumpReady && this.numJumps < 2) {
                this.setVelocity(undefined, -6);
                this.numJumps++;
            }
            this.jumpReady = false;
        }
        else {
            this.jumpReady = true;
        }
        
        // Control whether you are passing through blocks or not
        if((input.click('Down') && this.passing <= 0)) {
            this.passing = 20;
            this.body.collisionFilter.category = category.passThrough;
            
        }
        else if(this.passing <= 0 && !this.onLadder) {
            this.body.collisionFilter.category = category.player;
        }
       
        if((this.numJumps > 0 && this.body.velocity.y < 0) || this.onLadder || this.passing > 0) {
            this.body.collisionFilter.category = category.passThrough;
        }
        
        // Shoot bullets if not on ladder
        if(mouse.clicked && !this.onLadder && this.reloadWait <= 0) {
            this.shoot();
        }
        
        // Handle powerups
        if(input.click('Pwup1') && this.powerups[0] !== false) {
            this.doPowerups(0);
            this.powerups[0] = false;
        }
        else if(input.click('Pwup2') && this.powerups[1] !== false) {
            this.doPowerups(1);
            this.powerups[1] = false;
        }
        else if(input.click('Pwup3') && this.powerups[2] !== false) {
            this.doPowerups(2);
            this.powerups[2] = false;
        }
    
        // Reset numJumps when on ground
        if(abs(this.body.velocity.y) <= 0.1) {
            this.numJumps = 0;
        }
        
        // Control ladder movement
        if(this.onLadder) {
            let ladderSpeed = 1.5;
            if (input.press('Up')) {
                this.setVelocity(0, -ladderSpeed)
            } 
            else if (input.press('Down')) {
                this.setVelocity(0, ladderSpeed)
            } 
            else {
                this.setVelocity(undefined, 0)
            }
            if (input.press('Right')) {
                this.setVelocity(ladderSpeed, 0)
            } 
            else if (input.press('Left')) {
                this.setVelocity(-ladderSpeed, 0)
            } 
            else {
                this.setVelocity(0, undefined)
            }
            this.body.noGravity = true;
        }
        else {
            this.body.noGravity = false;
        }
        
        // Constrain velocity
        this.setVelocity(constrain(this.body.velocity.x, -this.maxVel, this.maxVel), constrain(this.body.velocity.y, -10, 12))
        
        this.passing--;
        this.reloadWait--;
    }
    updateTimeline() {
        if(frameCount % frameGap == 0) {
            this.timeline.push({
                x: this.body.position.x,
                y: this.body.position.y,
                armAngle: this.armAngle,
                img: this.art.img,
                imgWid: this.art.wid,
                frame: this.timeline.length * frameGap
            })
        }
    }
    update() {
        this.updatePos();
        
        // Stop if boss defeated
        if(this.game.boss.health <= 0) {
            this.stopped = true;
        }
        if(this.health <= 0 && debug.death) {
            this.setVelocity(0, 0)
            
        }
        
        // Handle the input if not stopped
        if(!this.stopped) {
            this.handleInput();
            this.hurt--;
        }
        
        if(this.powerupCount <= 0) {
            this.powerupActive = false;
        }
        
        // Add to the timeline
        this.updateTimeline();
        
        // If in a boss shockwave deal damage
        this.game.boss.shockwaves.forEach(wave => {
            var d = dist(this.x, this.y, wave.x, wave.y);
            if(d < 70+wave.wid/2 && d > 70-wave.wid/2 && this.x > wave.x) {
                
                this.takeDamage(0.5)
            }
        })
    }
}

class Enemy extends PhysicsObject {
    constructor(config) {
        super(config);
        Matter.Body.set(this.body, {
            collisionFilter: {
                category: category.enemy, 
                mask: category.projectile | category.player | category.fallingGear,  
                group: 0 
            },
            isStatic: false,
            noGravity: true,
            isSensor: true,
          //  sleepThreshold: Infinity,
        });
 
        this.maxHealth = config.maxHealth;
        this.health = this.maxHealth;
        this.dir = 1;
        this.dead = false;
        this.past = false;
        this.waitTime = 80;
        this.spawnAnimation = new PixelAnimation('spawn')
        this.deathTime = null;
        this.spawnData = {
            x: config.x,
            y: config.y,
            startFrame: config.timeSinceStart,
        }
    }
    handleCollisions(otherBody, type) {
        let obj = otherBody.object;
        let cat = otherBody.collisionFilter.category;
        
        if(type === 'start') {
    
            if(cat === category.projectile && this.waitTime <= 0 && obj.waitTime <= 0 && !this.dead && !obj.dead && obj.from === 'player' && 
            ((this instanceof Spiderling && this.invulnerable <= 0) || !(this instanceof Spiderling)) &&
            ((this instanceof Wraith && this.opacity >= 0.8) || !(this instanceof Wraith))) {
           
              
               // if(!(this instanceof Spiderling)) {
                this.health--;
                this.hurt = 3;
                //}
                
                // Record the death for replay
                if(this.health <= 0 && !this.past) {
                    this.deathTime = this.waitTime
                }
                
                if(this.health > 0 || this instanceof Boss) {
                    obj.die();
                }
                
                if(this instanceof Flying_Clock) {
                    if(this.health === 0) {
                        this.setAcceleration(0, -4)
                    }
                    this.hurt = 15;
                }
                
            }
            
            
            // Check if hitting falling gear
            if(cat === category.fallingGear && this.waitTime <= 0) {
                this.dead = true;
            }
            
           
        }
    }
    reset(newTarget) {
        // Reset position
        Body.setPosition(this.body, {x:this.spawnData.x, y:this.spawnData.y})
        
        this.setVelocity(0, 0)
        this.updatePos();
        this.past = true;
        this.dead = false;
        this.waitTime = this.spawnData.startFrame+50;
        this.health = this.maxHealth;
        this.target = newTarget ? newTarget : this.target;
        
    }
    drawSpawn() {
        pushMatrix();
        translate(this.x, this.y);
        if(this.waitTime <= 30) {
            this.spawnAnimation.run(0, 0, 50, 6, 'spawn')
        }
        else if(this.waitTime <= 80) {
            rotate(frameCount/1.5)
            drawStaticArt(0, 0, 40, 'spawn');
        }
        popMatrix();
    }
}

class Pendulum {
    constructor(config) {
        this.x = config.x;
        this.y = config.y;
        this.len = 600;
        this.rot = 40;
        this.anchor = Bodies.rectangle(this.x, this.y, 20, 20, { isStatic: true, collisionFilter: {category: category.nothing, group: -1}})
        this.bob = Bodies.circle(this.x+cos(this.rot)*this.len, this.y+sin(this.rot)*this.len, 60, 
        {
            
            frictionAir: 0,
            friction: 0,
            inertia: Infinity,
            collisionFilter: {
                category: category.obstacle,
                mask: category.player | category.passThrough
            },
            object: this
        })
        this.arm = Constraint.create({
            bodyA: this.anchor,
            bodyB: this.bob,
            length: this.len
        })
        World.add(engine.world, this.anchor)
        World.add(engine.world, this.bob)
        World.add(engine.world, this.arm)
        
        this.spikeTimer = 0;
        this.spikeDist = 0;
    }
    update() {
        stroke(colors.LIGHT)
        strokeWeight(7);
        line(this.anchor.position.x, this.anchor.position.y, this.bob.position.x, this.bob.position.y)
        noStroke();
        
        fill(colors.LIGHT)
        rect(this.anchor.position.x, this.anchor.position.y, 20, 20)
        pushMatrix()
        translate(this.bob.position.x, this.bob.position.y)
        rotate(atan2(this.bob.position.y-this.anchor.position.y, this.bob.position.x-this.anchor.position.x))
        if(this.spikeTimer < 50 && this.spikeDist < 50) {
            this.spikeTimer++;
            this.spikeDist = lerp(this.spikeDist, 50, 0.1)
        }
        else if(this.spikeTimer < 60) {
            this.spikeTimer++
            this.spikeDist-=5
        }
        else {
            this.spikeTimer = 0;
        }
        for(let i = 0; i<360; i+=40) {
            pushMatrix();
            rotate(i)
                drawStaticArt(23+this.spikeDist, 0, 27, 'spike')
            popMatrix();
        }
        
        drawStaticArt(0, 0, this.bob.circleRadius*2, 'pendulum')
    
        popMatrix();
        
        
        if(frameCount % 30 === 0) {
            Body.applyForce(this.bob, this.bob.position, {x: this.bob.velocity.x*0.0002, y: 0})
       }
    }
}

class Ghost extends Enemy {
    constructor(config) {
        config.maxHealth = 1;
        config.wid = 30;
        config.hei = 45;
        super(config);
        this.speed = 0.01;
        this.startSpeed = this.speed
        this.target = config.target;
        
        this.hurt = false;
        
        this.art = new PixelAnimation('ghost');
        this.moving = false;
    }
    display() {
        if(!this.dead) {
            if(this.waitTime <= 0) {
                pushMatrix();
                translate(this.x, this.y)
                scale(-this.dir, 1)
                if(this.hurt <= 0) {
                    this.art.run(0, 0, 40, 17, 'move')
                }
                else {
                    this.art.run(0, 0, 40, 3, 'hurt')
                    this.hurt--;
                }
                popMatrix();
            }
            else if(this.waitTime <= 80) {
               this.drawSpawn();
            }
        }
    }
    followPlayer() {
        // If moving go towards player
        if(this.target.body) {
            this.target = this.target.body;
        }
        let d = dist(this.target.position.x, this.target.position.y, this.x, this.y)
        
        if(d < 600 && d > 10) {
            // The target is either a past player or the current player
            if(this.target.body) {
                this.target = this.target.body;
            }
            
            // Get the direction and go towards the player
            var angle = atan2(this.target.position.y - this.y, this.target.position.x - this.x)
        
            var dis = Vector.sub(this.target.position, this.body.position);
            dis = Vector.normalise(dis)
            
            this.speed = this.hurt <= 0 ? this.speed : 0.001;
            let acc = Vector.mult(dis, map(Vector.magnitude(dis), 0, 1, 0, this.speed))
            
            
            this.setAcceleration(acc.x, acc.y)
            
            this.body.velocity.x = constrain(this.body.velocity.x, -4, 4)
            this.body.velocity.y = constrain(this.body.velocity.y, -4, 4)
            
            
            // Set the direction for drawing
            this.dir = this.body.velocity.x >= 0 ? 1 : -1
        }
    }
    update() {
        this.updatePos();
        
        if(!this.dead && this.waitTime <= 0 && (!this.past || (this.past && this.waitTime > this.deathTime))) {
            
            this.followPlayer();
        }
        
        this.waitTime--;
        
        if(this.health <= 0 && this.hurt <= 0) {
            this.dead = true;
        }
        
        if(this.dead) {
            for(var i = 0; i<15; i++) {
                Particles.create({
                    x: this.x,
                    y: this.y,
                    xv: random(-1, 1),
                    yv: random(-1, 1),
                    o: this.past ? 100 : 200,
                    //grav: true,
                    s: random(5, 10),
                    fs: 2
                    
                })
            }
        }
        
        this.speed = this.startSpeed
        
    }
}

class Flying_Clock extends Enemy {
    constructor(config, game) {
        config.maxHealth = 2;
        config.wid = 30;
        config.hei = 20;
        super(config);
        this.target = config.target;
        this.game = game;
        this.reloadWait = 120;
        this.art = new PixelAnimation('flying_clock')
        this.arrowAngle = 0;
        this.speed = 0.5;
        this.startSpeed = this.speed
        this.hurt = 0;
        this.falling = false;
        this.target = this.game.player.body;
    }
    display() {
        if(this.waitTime <= 0) {
            pushMatrix();
            translate(this.x, this.y)
            scale(-this.dir, 1);
            if(this.falling) {
                this.art.run(0, 0, 70, 10, 'dead')
                this.body.noGravity = false;
            }
            else if(this.hurt > 0) {
                this.art.run(0, 0, 70, 10, 'hurt')
                this.hurt--;
            }
            else {
                if(frameCount % 2 === 0) playSound('wingFlap');
                this.art.run(0, 0, 70, 10, 'move')
            }
            
            pushMatrix();
            scale(-this.dir, 1)
            translate(-1, floor(sin(-frameCount*6)));
            rotate(this.arrowAngle);
            stroke(colors.DARK)
            strokeWeight(1.0);
            line(0, 0, 6, 0);
            triangle(7, -2, 7, 2, 8, 0)
            
            rotate(45)
            line(0, 0, 6, 0);
            triangle(7, -2, 7, 2, 8, 0);
            popMatrix();
            noStroke();
            popMatrix();
        }
        else {
            this.drawSpawn();
        }
    }
    shoot() {
        
        this.arrowAngle = atan2(this.target.position.y - this.y, this.target.position.x - this.x);
        
        if(dist(this.target.position.x, this.target.position.y, this.x, this.y) > 200) {
            this.speed = this.hurt <= 0 ? this.speed : 0.01;
            this.setVelocity(this.speed * cos(this.arrowAngle), this.speed * sin(this.arrowAngle))
        }
        
        this.dir = this.body.velocity.x >= 0 ? 1 : -1;
        
        if(this.reloadWait <= 0) {
            this.game.bullets.push(new Projectile({
                x: this.x+cos(this.arrowAngle),
                y: this.y+sin(this.arrowAngle), 
                wid: 23,
                hei: 7,
                from: 'enemy',
                angle: this.arrowAngle,
                past: false,
                img: 'arrow'
            }))
            this.reloadWait = 120;
        }
        this.reloadWait--;
    }
    update() {
        this.updatePos();
        
        if(!this.falling) {
            if(this.waitTime <= 0 && !this.dead) {
                this.shoot();
            }
        }
        else {
            this.dead = this.y > height;
        }
        
        this.waitTime--;
        this.falling = this.health <= 0;
        this.speed = this.startSpeed;
    }
}

class Spider extends Enemy {
    constructor(config, game) {
        config.maxHealth = 5;
        config.wid = 79;
        config.hei = 102;
        super(config);
        
        this.body.isStatic = true;
   
        this.game = game;
        
        this.spawnY = -5+random(10, 20);
        this.setPosition(undefined, this.spawnY)
        this.updatePos();
        
        this.target = config.target;
        this.bombReload = 350;
        
        this.legRot = 0;
        this.attackTimer = 0;
        this.headArt = new PixelAnimation('spider_head')
        this.spawnData = {
            x: this.x,
            y: this.y,
            startFrame: config.timeSinceStart,
        }
        
    }
    legHalf() {
        pushMatrix();
        translate(this.x, this.y);
        rotate(sin(frameCount)*2)
            drawStaticArt(30, -33, 46, 'spider_leg')
            drawStaticArt(43, -11, 53, 'spider_leg2')
        
        scale(1, -1)
        if(this.attacking && abs(this.target.y-this.y) <= 180) {
            this.legRot = lerp(this.legRot, -15, 0.05)
            rotate(this.legRot)
        }
            drawStaticArt(30, -89, 40, 'spider_leg')
            drawStaticArt(41, -75, 46, 'spider_leg2')
        popMatrix();
    }
    display() {
        if(!this.dead && this.waitTime <= 0) {
            // Web
            stroke(colors.LIGHT);
            strokeWeight(3);
            line(this.x, -100, this.x, this.y)
            noStroke();
            
            // Legs
            this.legHalf();
            
            pushMatrix();
            translate(this.x, this.y)
            scale(-1, 1);
            translate(-this.x, -this.y)
                this.legHalf();
            popMatrix();
            
            // Body
            drawStaticArt(this.x, this.y-25, this.wid, 'spider_body')
            
            if(this.attacking) {
                this.headArt.run(this.x, this.y+40, this.wid, 40, 'attack')
            }
            else {
                this.headArt.run(this.x, this.y+40, this.wid, 50, 'idle')
            }
        }
        else if(!this.dead) {
            this.drawSpawn();
        }
    }
    move() {
        if(this.attacking) {
            this.setPosition(undefined, lerp(this.y, this.target.y-130, 0.15))
        }
        else if(this.y < this.spawnY-1) {
            this.setPosition(undefined, lerp(this.y, this.spawnY, 0.1))
        }
    }
    attack() {
        // Shoot
        if(frameCount % this.bombReload === 0) {
            this.game.bullets.push(new Time_Bomb({
                x: this.x, y: this.y+this.wid/2,
                wid: 10, hei: 10,
                range: this.target.x-this.x,
                height: this.target.y-this.y,
                
            }))
        }
        
        // Attack player
        if(this.attackTimer <= 0 && abs(this.target.x - this.x) < 30 && !this.attacking) {
            this.attacking = true;
            if(this.target.takeDamage) this.target.takeDamage(settingConfig.easyMode ? 1 : 2)
        }
        
        // Grab player
        if((this.attacking && abs(this.target.y-this.y) < 150)) {
            let grabY = lerp(this.y, this.spawnY, 0.1)+130
            
            if(this.target instanceof Player) {
                this.target.setPosition(this.x, grabY)
                this.target.stopped = true;
                this.target.art.wid = 30;
                this.target.art.img = animateArt.player.idle[0]
            }
        }  
        
        // Increment attackTimer
        if (this.attacking || this.attackTimer > 0) {
            this.attackTimer++;
            if (this.attackTimer > 500) {
                this.attackTimer = 0;
            }
        }
        
        // Release the player
        if(this.attacking && abs(this.spawnY-this.y) < 15 && this.attackTimer > 150) {
            this.target.passing = 50;
            this.target.stopped = false;
            this.attacking = false;
            
        }
        
    }
    update() {
        if(this.health <= 0) {
            if(!this.past) {
                this.game.enemies.push(new Spiderling({
                x: this.x, y: this.y+100
            }, this.game))
                this.game.enemies.push(new Spiderling({
                    x: this.x+random(-10, 10), y: this.y+100
                }, this.game))
            }
            this.dead = true;
        }
        
        if(!this.target.body && this.target.position) {
            //this.target = this.target.position
        }
        
        if(!this.dead && this.waitTime <= 0) {
            this.updatePos();
            
            this.move();
            
            this.attack();
        }
        
        
        this.waitTime--;

    }
}

class Spiderling extends Enemy {
    constructor(config, game) {
        config.wid = 20,
        config.hei = 20;
        config.maxHealth = 1;
        super(config);
        Matter.Body.set(this.body, {
            collisionFilter: {
                category: category.enemy,
                mask: category.player | category.passThrough | category.wall | category.projectile,
                group: 0,
            },
            noGravity: false,
            isSensor: false,
            sleepThreshold: Infinity,
        })
        this.ghostMask = category.player | category.wall | category.projectile,
        this.regMask = category.player | category.passThrough | category.wall | category.projectile,
        this.game = game;
        this.player = this.game.player;
        this.waitTime = 0;
        this.jumped = false;
        this.jumpTimer = 0;
        this.dir = 1;
        this.rot = 0;
        this.invulnerable = 50;
    
        this.setVelocity(random(-3, 3))
        this.art = new PixelAnimation('spiderling');
    }
    display() {
        
        this.dir = this.player.x > this.x ? 1 : -1;
        
        if(abs(this.body.velocity.x) < 0.001 && this.body.velocity.y > 0.2) {
            this.rot = 90;
        }
        pushMatrix();
        translate(this.x, this.y);
        scale(this.dir, 1);
        rotate(this.rot)
        
            if(abs(this.body.velocity.y) > 0.5) {
                drawStaticArt(0, 0, 35, 'spiderling_jump')
            }
            else {
                drawStaticArt(0, 0, 30, 'spiderling')
            }
        popMatrix();
    }
    attack() {
        // Jump 
        if(this.jumpTimer <= 0) {
            this.body.collisionFilter.mask = this.ghostMask
            
            this.jumpAngle = atan2(this.player.y-this.y, this.player.x-this.x);
            let d = map(dist(this.player.x, this.player.y, this.x, this.y), 0, 800, 0, 50)
            this.setAcceleration(cos(this.jumpAngle)*d, sin(this.jumpAngle)*d)
            this.jumpTimer = random(120, 160);
        }
        
        let ray = Matter.Query.ray(this.game.blocks.map(b => b.body), this.body.position, this.player.body.position);
        let blocked = ray.some(hit => hit.body.collisionFilter.category === category.passThrough);
        
        // Go though platforms if blocked
        if (blocked && this.body.velocity.y < -0.1) {
           this.body.collisionFilter.mask = this.ghostMask;
        }
        
        // Collide if about to land
        if(this.body.velocity.y > 0.5) {
            this.body.collisionFilter.mask = this.regMask;
        }
        
        // Jump down if player lower
        if(this.player.y-40 > this.y && this.jumpTimer > 80) {
            this.body.collisionFilter.mask = this.ghostMask;
        }
       
        this.jumpTimer--;
        
    }
    update() {
        this.updatePos();
        this.invulnerable--;
        
        if(this.invulnerable <= -50) {
            this.attack();
        }
        
        if(this.health <= 0 ) {
            this.dead = true;
            
            for(let i = 0; i<15; i++) {
                Particles.create({
                    x: this.x, y: this.y, 
                    xv: random(-2, 2), yv: random(-1, -0.5),
                    s: random(4, 7),
                    grav: true,
                    fs: 1,
                })
            }
        }
    }
}

class Wraith extends Enemy {
    constructor(config, game) {
        config.maxHealth = 3;
        config.wid = 80;
        config.hei = 90;
        super(config);
        
        this.createChain();
        
        this.game = game;
        this.target = config.target;
        this.teleportTimer = 0;
        this.teleporting = false;
        this.targetSeen = false;
        this.art = new PixelAnimation('wraith')
    }
    createChain() {
        this.chainOffset = {x: this.body.position.x-32, y: this.body.position.y+2};
        this.chain = Composites.stack(this.chainOffset.x, this.chainOffset.y, 10, 1, 2, 0, (x, y) => {
            return Bodies.rectangle(x, y, 10, 4, {
                collisionFilter: { 
                    category: category.nothing, 
                    group: -1
                },
                frictionAir: 0.05, 
                density: 0.005,    
                object: this,
                
            });
        });
        Composites.chain(this.chain, 0.3, 0, -0.3, 0, {
          stiffness: 1,
          length: 0,
          render: { type: 'line' },
        });
        this.ball = Bodies.circle(this.chain.bodies[this.chain.bodies.length - 1].position.x, this.chain.bodies[this.chain.bodies.length - 1].position.y + 10, 10,
            {
               collisionFilter: { 
                    category: category.chainWeapon, 
                    mask: category.player | category.wall | category.shield,
                    group: 0
                },
               frictionAir: 0.04,
               density: 0.006, 
               restitution: 0.4,
               object: this
            }
        );
        this.ballConstraint = Constraint.create({
            bodyA: this.chain.bodies[this.chain.bodies.length - 1],
            bodyB: this.ball,
            stiffness: 1,
            length: 0,
        });
       
        this.arm = Constraint.create({
            pointA: { x: this.chainOffset.x, y: this.chainOffset.y},
            bodyB: this.chain.bodies[0],
            stiffness: 1,
            damping: 0.5
        });
        World.add(engine.world, [this.chain, this.arm, this.ball, this.ballConstraint]);
    }
    display() {
        if(!this.dead) {
            if(this.waitTime <= 0) {
                // Control direction
                if(this.target.x > this.x) {
                    this.dir = -1;
                }
                else {
                    this.dir = 1;
                }
            
                // Control the opacity
                if(this.teleportTimer < 200) {
                    this.opacity = constrain(norm(this.teleportTimer, 200, 100), 0, 1);
                    ctx.globalAlpha = this.opacity
                }
                else if(this.teleportTimer > 250){
                    this.opacity = constrain(norm(this.teleportTimer, 250, 350), 0, 1)
                    ctx.globalAlpha = this.opacity
                   
                }
                else {
                    this.opacity = 0;
                    ctx.globalAlpha = 0;
                }
                
                // Draw the chain weapon
                for(let body of this.chain.bodies) {
                    pushMatrix();
                    translate(body.position.x, body.position.y)
                    rotate(body.angle * 180/PI + 90)
                    drawStaticArt(0, 0, 6, 'chain2')
                    popMatrix();
                }
                
                drawStaticArt(this.ball.position.x, this.ball.position.y, this.ball.circleRadius*2, 'wraith_ball')
               
                // Draw the slightly rotating
                pushMatrix();
                translate(this.x+(this.dir === -1 ? 30 : 0), this.y+2);
                scale(this.dir, 1)
                rotate(sin(atan2(this.y-this.ball.position.y, this.x-this.ball.position.x))*16);
                
                    drawStaticArt(-20, -5, 45, 'wraith_arm')
                popMatrix();
                
                // Draw the body
                pushMatrix();
                translate(this.x+16, this.y);
                scale(this.dir, 1)
                    this.art.run(0, 0, 100, 14, 'wraith')
                popMatrix();
                
                ctx.globalAlpha = 1;
            }
            else {
                this.drawSpawn();
            }
        }
    }
    handleWeapon() {
        this.chainOffset = {x: this.x-29+(this.dir === -1 ? 90 : 0), y: this.y+2};
        this.arm.pointA.x = this.chainOffset.x
        this.arm.pointA.y = this.chainOffset.y - sin(atan2(this.y-this.ball.position.y, this.x-this.ball.position.x))*7
        
        if(dist(this.x, this.y, this.target.x, this.target.y) < 300) {
            this.targetSeen = true;
        }
        
        if(this.ball.position.y > this.chainOffset.y+10 && frameCount % 40 === 0 && this.opacity > 0.8) {
            playSound('chain')
        }
        
        if(this.targetSeen) {
            const forceMag = 0.005 * this.dir;
            Body.applyForce(this.ball, this.ball.position, {
      x: cos(frameCount*6) * forceMag,
      y: sin(frameCount*6*-this.dir) * forceMag
    });
    
            if(this.waitTime <= 0 && dist(this.x, this.y, this.target.x, this.target.y) > 60) {
                const angle = atan2(this.target.y-this.y, this.target.x-this.x)
                this.setVelocity(cos(angle)*0.4, sin(angle)*0.4)
            }
        }
        
        if(this.dead) {
            this.ball.collisionFilter.category = category.nothing
        }
        
        if(this.opacity < 0.5) {
            this.ball.collisionFilter.category = category.nothing;
        }
        else {
            this.ball.collisionFilter.category = category.chainWeapon;
        }
        
    }
    teleport() {
        
        if(this.teleportTimer === 200 && dist(this.x, this.y, this.target.x, this.target.y) > 200) {
            const points = this.game.manager.getSpawnPoints();
            
            if(this.targetSeen) {
                points.filter(pt => dist(pt.x, pt.y, this.target.x, this.target.y) < 50)
            }
            
            const spawnPoint = points[floor(random(0, points.length))]
            this.setPosition(spawnPoint.x, spawnPoint.y)
            Body.setPosition(this.ball, {x: spawnPoint.x + 30, y: spawnPoint.y + 20})
        }
        if(this.teleportTimer > 600) {
            this.teleportTimer = 0;
        }
        this.teleportTimer++;
    }
    update() {
        this.updatePos();
        
        if(this.waitTime <= 0) {
            this.teleport();
            this.handleWeapon();
        }
      
        if(this.health <= 0) {
            this.dead = true;
        }
        
        if(this.dead) {
            for(var i = 0; i<15; i++) {
                Particles.create({
                    x: this.x,
                    y: this.y,
                    xv: random(-1, 1),
                    yv: random(-1, 1),
                    o: this.past ? 100 : 200,
                    //grav: true,
                    s: random(5, 10),
                    fs: 2
                    
                })
            }
        }
        
        this.waitTime--;
    }
}

                x: 13,

                y: -57,
                yv: 0,
                rot: 0,
            },

                y: 21,
                yv: 0,
                rot: 0
            },
            calf: {
                rot: -15
            },
            rightLeg: {
                rot: 0,   
                y: 31,
                yv: 0,
            },
